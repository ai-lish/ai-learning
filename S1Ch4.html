<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch4 多項式 - AI Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #2C3E50; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { background: #e67e22; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .header a { color: white; text-decoration: none; }
        .tabs { display: flex; background: #f0f0f0; border-bottom: 2px solid #ddd; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; color: #666; transition: all 0.3s; border: none; background: none; font-size: 1rem; }
        .tab:hover { background: #e0e0e0; }
        .tab.active { background: white; color: #e67e22; border-bottom: 3px solid #e67e22; }
        .tab-content { display: none; padding: 25px; }
        .tab-content.active { display: block; }
        .note-section { margin-bottom: 25px; }
        .note-title { font-size: 1.3rem; font-weight: 700; color: #2C3E50; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e67e22; }
        .note-subtitle { font-size: 1.1rem; font-weight: 600; color: #e67e22; margin: 20px 0 10px; }
        .note-desc { line-height: 1.8; color: #555; margin-bottom: 15px; }
        .note-points { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .note-points li { margin: 8px 0; line-height: 1.6; }
        .practice-item { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .practice-label { background: #e67e22; color: white; padding: 5px 12px; border-radius: 20px; display: inline-block; font-size: 0.85rem; margin-bottom: 10px; }
        .practice-question { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; }
        .practice-hint { background: #fff3cd; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.9rem; color: #856404; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .game-card { background: white; border: 2px solid #e0e0e0; border-radius: 12px; padding: 15px; text-align: center; transition: all 0.3s; }
        .game-card:hover { border-color: #e67e22; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .game-card h3 { font-size: 1rem; margin-bottom: 10px; color: #2C3E50; }
        .game-btn { background: #e67e22; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 10px; }
        .game-btn:hover { background: #d35400; }
        .back-link { display: inline-block; color: white; text-decoration: none; padding: 8px 16px; background: rgba(255,255,255,0.2); border-radius: 6px; margin-top: 10px; }
    
/* 漢堡包 */
.hamburger { position: fixed; top: 15px; left: 15px; cursor: pointer; padding: 8px; z-index: 100; background: rgba(0,0,0,0.3); border-radius: 5px; }
.hamburger span { display: block; width: 25px; height: 3px; background: white; margin: 5px 0; border-radius: 2px; }
.menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }
.menu-overlay.open { display: block; }
.side-menu { visibility: hidden; position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: white; z-index: 100; transition: right 0.3s; overflow-y: auto; box-shadow: -2px 0 10px rgba(0,0,0,0.2); }
.side-menu.open { visibility: visible; right: 0; }
.side-menu-header { padding: 20px; background: #2c3e50; color: white; display: flex; justify-content: space-between; align-items: center; }
.side-menu-header h2 { font-size: 1.2rem; }
.close-menu { cursor: pointer; font-size: 1.5rem; }
.side-menu-content { padding: 10px; }
.menu-section { margin-bottom: 15px; }
.menu-btn { display: block; width: 100%; padding: 12px 15px; margin: 5px 0; border: none; border-radius: 8px; background: #f5f7fa; cursor: pointer; text-align: left; font-size: 1rem; }
.menu-btn:hover { background: #e0e0e0; }
.grade-chapters { display: none; padding-left: 10px; }
.grade-chapters.open { display: block; }
.grade-header { font-weight: bold; background: #f0f0f0; }
</style>
</head>
<body>
    <!-- 漢堡包菜單 -->
    <div class="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <h2>選單</h2>
            <span class="close-menu" onclick="closeMenu()">✕</span>
        </div>
        <div class="side-menu-content">
            <div class="menu-section">
                <div class="menu-btn grade-header" onclick="toggleGrade('s1')">▼ 中一</div>
                <div class="grade-chapters" id="chapters-s1">
                    <button class="menu-btn" onclick="goToCh(1)">Ch1 基礎運算</button>
                    <button class="menu-btn" onclick="goToCh(2)">Ch2 有向數</button>
                    <button class="menu-btn" onclick="goToCh(3)">Ch3 代數式</button>
                    <button class="menu-btn" onclick="goToCh(4)">Ch4 多項式</button>
                    <button class="menu-btn" onclick="goToCh(5)">Ch5 面積與體積</button>
                    <button class="menu-btn" onclick="goToCh(6)">Ch6 多項式</button>
                    <button class="menu-btn" onclick="goToCh(7)">Ch7 方程</button>
                    <button class="menu-btn" onclick="goToCh(10)">Ch10 坐標</button>
                </div>
            </div>
            <div class="menu-section">
                <button class="menu-btn exam" onclick="goToExam()">📝 考試專區</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <a href="index.html" class="back-link">← 返回</a>
            <h1>Ch4 多項式</h1>
            <p>代數語言、加減乘法</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab(1)">📖 筆記</button>
            <button class="tab" onclick="switchTab(2)">📝 例題重做</button>
            <button class="tab" onclick="switchTab(3)">🎮 互動練習</button>
        </div>
        
        <div id="tab1" class="tab-content active">
            <div class="note-section">
                <div class="note-title">📚 多項式既基本概念</div>
                <div class="note-subtitle">咩係多項式？</div>
                <div class="note-desc">多項式係由常數同埋變數通过加、減、乘（但唔包括除）組合成既代數式。</div>
                <div class="note-subtitle">多項式既次數</div>
                <div class="note-desc">多項式中，指數最大既項既指數就係呢個多項式既次數。</div>
                <div class="note-points">
                    <strong>例子：</strong>
                    <ul>
                        <li>3x² + 2x + 1 係二次多項式</li>
                        <li>x³ - x² + 5 係三次多項式</li>
                    </ul>
                </div>
            </div>
        </div>
        
        <div id="tab2" class="tab-content">
            <div class="practice-item">
                <span class="practice-label">展開括號</span>
                <div class="practice-question">練習：3(x + 2) = ?</div>
                <div class="practice-hint">提示：3 × x + 3 × 2</div>
            </div>
            <div class="practice-item">
                <span class="practice-label">展開再合併</span>
                <div class="practice-question">練習：2(x + 3) + 3(x - 1) = ?</div>
            </div>
        </div>
        
        <div id="tab3" class="tab-content">
            <div class="games-grid">
            </div>
        </div>
    </div>
    <script>
        function switchTab(num) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab')[num-1].classList.add('active');
            document.getElementById('tab' + num).classList.add('active');
        }
    </script>
<script>
function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); document.getElementById('menuOverlay').classList.toggle('open'); }
function closeMenu() { document.getElementById('sideMenu').classList.remove('open'); document.getElementById('menuOverlay').classList.remove('open'); }
function goToCh(n) { window.location.href = 'S1Ch' + n + '.html'; closeMenu(); }
function goToExam() { window.location.href = 'index.html'; closeMenu(); }
function toggleGrade(grade) { const el = document.getElementById('chapters-' + grade); el.classList.toggle('open'); }
</script>
</body>
</html>
