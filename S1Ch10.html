<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch10 坐標 - AI Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #2C3E50; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { background: #34495e; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .header a { color: white; text-decoration: none; }
        .tabs { display: flex; background: #f0f0f0; border-bottom: 2px solid #ddd; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; color: #666; transition: all 0.3s; border: none; background: none; font-size: 1rem; }
        .tab:hover { background: #e0e0e0; }
        .tab.active { background: white; color: #34495e; border-bottom: 3px solid #34495e; }
        .tab-content { display: none; padding: 25px; }
        .tab-content.active { display: block; }
        .note-section { margin-bottom: 25px; }
        .note-title { font-size: 1.3rem; font-weight: 700; color: #2C3E50; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #34495e; }
        .note-subtitle { font-size: 1.1rem; font-weight: 600; color: #34495e; margin: 20px 0 10px; }
        .note-desc { line-height: 1.8; color: #555; margin-bottom: 15px; }
        .note-points { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .note-points li { margin: 8px 0; line-height: 1.6; }
        .practice-item { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .practice-label { background: #34495e; color: white; padding: 5px 12px; border-radius: 20px; display: inline-block; font-size: 0.85rem; margin-bottom: 10px; }
        .practice-question { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; }
        .practice-hint { background: #fff3cd; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.9rem; color: #856404; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .game-card { background: white; border: 2px solid #e0e0e0; border-radius: 12px; padding: 15px; text-align: center; transition: all 0.3s; }
        .game-card:hover { border-color: #34495e; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .game-card h3 { font-size: 1rem; margin-bottom: 10px; color: #2C3E50; }
        .game-btn { background: #34495e; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 10px; }
        .game-btn:hover { background: #2c3e50; }
        .back-link { display: inline-block; color: white; text-decoration: none; padding: 8px 16px; background: rgba(255,255,255,0.2); border-radius: 6px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="../index.html" class="back-link">← 返回</a>
            <h1>Ch10 坐標幾何</h1>
            <p>直角坐標系統</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab(1)">📖 筆記</button>
            <button class="tab" onclick="switchTab(2)">📝 例題重做</button>
            <button class="tab" onclick="switchTab(3)">🎮 互動練習</button>
        </div>
        
        <div id="tab1" class="tab-content active">
            <div class="note-section">
                <div class="note-title">📚 直角坐標系統</div>
                <div class="note-subtitle">咩係坐標？</div>
                <div class="note-desc">
                    坐標系統用兩個數字來確定平面上一點既位置。<br>
                    格式：(x, y)
                </div>
                <div class="note-subtitle">X軸同Y軸</div>
                <div class="note-desc">
                    • X軸：水平方向<br>
                    • Y軸：垂直方向<br>
                    • 原點O：(0, 0)
                </div>
                <div class="note-points">
                    <strong>例子：</strong>
                    <ul>
                        <li>A點：(3, 2）</li>
                        <li>B點：(-1, 4)</li>
                    </ul>
                </div>
            </div>
        </div>
        
        <div id="tab2" class="tab-content">
            <div class="practice-item">
                <span class="practice-label">坐標認識</span>
                <div class="practice-question">寫出以下點既坐標：</div>
                <div class="practice-hint">由X軸讀到，再由Y軸讀上</div>
            </div>
        </div>
        
        <div id="tab3" class="tab-content">
            <div class="games-grid">
                <div class="game-card">
                    <h3>📐 坐標幾何</h3>
                    <p>基礎練習</p>
                    <a href="games/S1Ch10-1-CoordinateGeometry.html" class="game-btn">開始練習</a>
                </div>
                <div class="game-card">
                    <h3>🎯 坐標練習</h3>
                    <p>坐標練習</p>
                    <a href="games/S1Ch10-2-Coordinate.html" class="game-btn">開始練習</a>
                </div>
                <div class="game-card">
                    <h3>🗺️ 坐標冒險</h3>
                    <p>坐標應用</p>
                    <a href="games/S1Ch10-3-CoordinateAdventure.html" class="game-btn">開始練習</a>
                </div>
                <div class="game-card">
                    <h3>🚀 大冒險</h3>
                    <p>進階挑戰</p>
                    <a href="games/S1Ch10-4-CoordinateAdventureBig.html" class="game-btn">開始練習</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function switchTab(num) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab')[num-1].classList.add('active');
            document.getElementById('tab' + num).classList.add('active');
        }
    </script>
</body>
</html>
