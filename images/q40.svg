<svg width="450" height="350" viewBox="0 0 450 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Q40: 長方體 -->
  <text x="225" y="25" font-size="14" text-anchor="middle">Q40: 長方體 (體積 648 cm³)</text>
  
  <!-- Front face -->
  <rect x="100" y="150" width="200" height="120" fill="#e0e0e0" stroke="black" stroke-width="2"/>
  
  <!-- Back face -->
  <rect x="180" y="70" width="200" height="120" fill="none" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Connecting edges -->
  <line x1="100" y1="150" x2="180" y2="70" stroke="black" stroke-width="2"/>
  <line x1="300" y1="150" x2="380" y2="70" stroke="black" stroke-width="2"/>
  <line x1="100" y1="270" x2="180" y2="190" stroke="black" stroke-width="2"/>
  <line x1="300" y1="270" x2="380" y2="190" stroke="black" stroke-width="2"/>
  
  <!-- Labels -->
  <text x="95" y="145" font-size="12" fill="blue">D</text>
  <text x="305" y="145" font-size="12" fill="blue">C</text>
  <text x="305" y="290" font-size="12" fill="blue">B</text>
  <text x="95" y="290" font-size="12" fill="blue">A</text>
  
  <text x="175" y="65" font-size="12" fill="red">D'</text>
  <text x="385" y="65" font-size="12" fill="red">C'</text>
  <text x="385" y="195" font-size="12" fill="red">B'</text>
  <text x="175" y="195" font-size="12" fill="red">A'</text>
  
  <!-- Dimensions -->
  <text x="200" y="145" font-size="12" text-anchor="middle">18cm (長)</text>
  <text x="80" y="210" font-size="12">3cm (寬)</text>
  <text x="290" y="60" font-size="12">a cm (高)</text>
  
  <!-- Calculation -->
  <text x="225" y="320" font-size="12" text-anchor="middle">體積 = 18 × 3 × a = 648</text>
  <text x="225" y="340" font-size="12" text-anchor="middle">a = 648 ÷ 54 = 12 cm</text>
</svg>