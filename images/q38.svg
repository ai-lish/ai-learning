<svg width="450" height="350" viewBox="0 0 450 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Q38: 梯形棱柱 -->
  <text x="225" y="25" font-size="14" text-anchor="middle">Q38: 梯形棱柱</text>
  
  <!-- Front face (trapezoid) -->
  <polygon points="100,280 180,280 260,180 140,180" fill="#e0e0e0" stroke="black" stroke-width="2"/>
  
  <!-- Back face -->
  <polygon points="180,100 260,100 340,200 220,200" fill="none" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Connecting edges -->
  <line x1="100" y1="280" x2="180" y2="100" stroke="black" stroke-width="2"/>
  <line x1="180" y1="280" x2="260" y2="100" stroke="black" stroke-width="2"/>
  <line x1="260" y1="180" x2="340" y2="200" stroke="black" stroke-width="2"/>
  <line x1="140" y1="180" x2="220" y2="200" stroke="black" stroke-width="2"/>
  
  <!-- Front face labels -->
  <text x="95" y="295" font-size="12" fill="blue">A</text>
  <text x="185" y="295" font-size="12" fill="blue">B</text>
  <text x="265" y="175" font-size="12" fill="blue">C</text>
  <text x="135" y="175" font-size="12" fill="blue">D</text>
  
  <!-- Back face labels -->
  <text x="175" y="95" font-size="12" fill="red">A'</text>
  <text x="265" y="95" font-size="12" fill="red">B'</text>
  <text x="345" y="195" font-size="12" fill="red">C'</text>
  <text x="215" y="195" font-size="12" fill="red">D'</text>
  
  <!-- Right angle markers -->
  <path d="M100 260 L100 270 L110 270" fill="none" stroke="black"/>
  <path d="M140 180 L140 190 L150 190" fill="none" stroke="black"/>
  
  <!-- Dimensions -->
  <text x="140" y="270" font-size="12" text-anchor="middle">2cm (上底)</text>
  <text x="220" y="270" font-size="12" text-anchor="middle">6cm (下底)</text>
  <text x="80" y="230" font-size="12">5cm (高)</text>
  <text x="280" y="140" font-size="12">7cm (斜邊)</text>
  <text x="160" y="60" font-size="12">10cm (長度)</text>
  
  <!-- Area calculation -->
  <text x="380" y="100" font-size="11">梯形面積 = (2+6)/2 × 5</text>
  <text x="380" y="120" font-size="11">= 20 cm²</text>
</svg>