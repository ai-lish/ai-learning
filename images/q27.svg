<svg width="400" height="350" viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Q27: 正方形棱柱 (長方體) -->
  <text x="200" y="25" font-size="14" text-anchor="middle">Q27: 正方形棱柱</text>
  
  <!-- 3D Box representation -->
  <!-- Front face (square) -->
  <rect x="150" y="150" width="100" height="100" fill="#e0e0e0" stroke="black" stroke-width="2"/>
  
  <!-- Back face -->
  <rect x="220" y="80" width="100" height="100" fill="none" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Connecting edges -->
  <line x1="150" y1="150" x2="220" y2="80" stroke="black" stroke-width="2"/>
  <line x1="250" y1="150" x2="320" y2="80" stroke="black" stroke-width="2"/>
  <line x1="150" y1="250" x2="220" y2="180" stroke="black" stroke-width="2"/>
  <line x1="250" y1="250" x2="320" y2="180" stroke="black" stroke-width="2"/>
  
  <!-- Labels -->
  <text x="200" y="205" font-size="12" text-anchor="middle">4cm</text>
  <text x="175" y="145" font-size="12" text-anchor="middle">4cm</text>
  <text x="270" y="115" font-size="12">8cm (高)</text>
  
  <!-- Corner labels -->
  <text x="145" y="145" font-size="12" fill="blue">D</text>
  <text x="255" y="145" font-size="12" fill="blue">C</text>
  <text x="255" y="255" font-size="12" fill="blue">B</text>
  <text x="145" y="255" font-size="12" fill="blue">A</text>
  
  <text x="215" y="75" font-size="12" fill="red">D'</text>
  <text x="325" y="75" font-size="12" fill="red">C'</text>
  <text x="325" y="185" font-size="12" fill="red">B'</text>
  <text x="215" y="185" font-size="12" fill="red">A'</text>
  
  <!-- Dimensions text -->
  <text x="200" y="300" font-size="14" text-anchor="middle">體積 = 4 × 4 × 8 = 128 cm³</text>
</svg>