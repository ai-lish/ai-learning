<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE 題目分流系統 - Phase 4</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #f5f5f5; padding: 20px; }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header .stats { display: flex; gap: 20px; font-size: 14px; }
        .header .stat { background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px; }
        .header .stat.high { background: #27ae60; }
        .header .stat.medium { background: #f39c12; }
        .header .stat.low { background: #e74c3c; }
        
        .filters {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters select, .filters button {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .filters button {
            background: #667eea;
            color: white;
            cursor: pointer;
            border: none;
        }
        .filters button:hover { background: #5568d3; }
        .filters button.export { background: #27ae60; }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: #e0e0e0;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .tab-btn.active { background: white; color: #667eea; }
        .tab-btn.high { background: #27ae60; color: white; }
        .tab-btn.medium { background: #f39c12; color: white; }
        .tab-btn.low { background: #e74c3c; color: white; }
        
        .question-card {
            background: white;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .question-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .question-header.high { background: #27ae60; }
        .question-header.medium { background: #f39c12; }
        .question-header.low { background: #e74c3c; }
        
        .question-header .q-id { font-size: 18px; font-weight: bold; }
        .question-header .q-meta { font-size: 14px; opacity: 0.9; }
        .question-header .confidence { font-size: 12px; background: rgba(0,0,0,0.2); padding: 3px 10px; border-radius: 10px; }
        
        .question-body { padding: 20px; }
        
        .text-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .text-section h4 { margin-bottom: 10px; color: #34495e; }
        .text-section.high-result { border-left: 4px solid #27ae60; }
        .text-section.medium-result { border-left: 4px solid #f39c12; }
        .text-section.low-result { border-left: 4px solid #e74c3c; }
        
        .ocr-text {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.8;
            font-family: inherit;
            resize: vertical;
        }
        .ocr-text:focus { border-color: #667eea; outline: none; }
        
        .status-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .status-row label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 20px;
            background: #f0f0f0;
        }
        .status-row input[type="checkbox"] { width: 18px; height: 18px; }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-group button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-group .adopt { background: #27ae60; color: white; }
        .btn-group .review { background: #f39c12; color: white; }
        .btn-group .reject { background: #e74c3c; color: white; }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .nav-buttons button {
            padding: 8px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
        }
        .nav-buttons button.prev { background: #e0e0e0; }
        .nav-buttons button.next { background: #667eea; color: white; }
        
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #27ae60, #667eea);
            transition: width 0.3s;
            z-index: 1001;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        
        .summary-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .summary-panel h3 { margin-bottom: 15px; color: #34495e; }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .summary-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .summary-item .number { font-size: 32px; font-weight: bold; color: #667eea; }
        .summary-item .label { font-size: 12px; color: #7f8c8d; margin-top: 5px; }
        .summary-item.high .number { color: #27ae60; }
        .summary-item.medium .number { color: #f39c12; }
        .summary-item.low .number { color: #e74c3c; }
        
        @media (max-width: 768px) {
            .question-body { padding: 15px; }
            .tabs { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="toast" id="toast">✓ 已保存</div>
    
    <div class="header">
        <h1>📚 HKDSE 題目分流系統 - Phase 4</h1>
        <div class="stats">
            <span class="stat high">✅ 高信心: <span id="highCount">0</span></span>
            <span class="stat medium">⚠️ 中信心: <span id="mediumCount">0</span></span>
            <span class="stat low">🔴 低信心: <span id="lowCount">0</span></span>
        </div>
    </div>
    
    <div class="summary-panel">
        <h3>📊 審核進度</h3>
        <div class="summary-grid">
            <div class="summary-item">
                <div class="number" id="totalReviewed">0</div>
                <div class="label">已審核</div>
            </div>
            <div class="summary-item high">
                <div class="number" id="totalAdopted">0</div>
                <div class="label">已採用</div>
            </div>
            <div class="summary-item medium">
                <div class="number" id="totalNeedsWork">0</div>
                <div class="label">需修改</div>
            </div>
            <div class="summary-item">
                <div class="number" id="remaining">0</div>
                <div class="label">剩餘</div>
            </div>
        </div>
    </div>
    
    <div class="filters">
        <label>課題:</label>
        <select id="topicFilter">
            <option value="all">全部課題</option>
        </select>
        
        <label>狀態:</label>
        <select id="statusFilter">
            <option value="all">全部</option>
            <option value="pending">待審核</option>
            <option value="adopted">已採用</option>
            <option value="needs_work">需修改</option>
        </select>
        
        <button onclick="prevQuestion()">⬆ 上一題</button>
        <button onclick="nextQuestion()">⬇ 下一題</button>
        <button onclick="jumpToNextPending()">➡ 下一個待審核</button>
        <button class="export" onclick="exportResults()">📤 匯出結果</button>
    </div>
    
    <div class="tabs">
        <button class="tab-btn high active" onclick="filterByConfidence('high', this)">✅ 高信心 (<span id="tabHigh">0</span>)</button>
        <button class="tab-btn medium" onclick="filterByConfidence('medium', this)">⚠️ 中信心 (<span id="tabMedium">0</span>)</button>
        <button class="tab-btn low" onclick="filterByConfidence('low', this)">🔴 低信心 (<span id="tabLow">0</span>)</button>
        <button class="tab-btn" onclick="filterByConfidence('all', this)">📋 全部 (<span id="tabAll">0</span>)</button>
    </div>
    
    <div id="questionsContainer"></div>
    
    <script>
        let allQuestions = [];
        let filteredQuestions = [];
        let currentIndex = 0;
        let currentFilter = 'all';
        let reviewStatus = {};
        
        async function loadData() {
            try {
                const response = await fetch('final_merged_results.json');
                const data = await response.json();
                allQuestions = data.p1 || [];
                
                // Initialize review status from localStorage
                const saved = localStorage.getItem('hkdse_phase4_review');
                if (saved) {
                    reviewStatus = JSON.parse(saved);
                }
                
                // Update statistics
                updateStats();
                populateTopicFilter();
                filterQuestions();
            } catch (e) {
                console.error('Error loading data:', e);
                // Try alternative path
                try {
                    const response = await fetch('../ocr-output/final_merged_results.json');
                    const data = await response.json();
                    allQuestions = data.p1 || [];
                    updateStats();
                    populateTopicFilter();
                    filterQuestions();
                } catch (e2) {
                    console.error('Error loading from parent:', e2);
                    document.getElementById('questionsContainer').innerHTML = 
                        '<p style="text-align:center;padding:50px;color:#e74c3c;">無法載入數據，請確保 final_merged_results.json 在正確位置</p>';
                }
            }
        }
        
        function updateStats() {
            const high = allQuestions.filter(q => q.final_status === 'high').length;
            const medium = allQuestions.filter(q => q.final_status === 'medium').length;
            const low = allQuestions.filter(q => q.final_status === 'low').length;
            
            document.getElementById('highCount').textContent = high;
            document.getElementById('mediumCount').textContent = medium;
            document.getElementById('lowCount').textContent = low;
            
            document.getElementById('tabHigh').textContent = high;
            document.getElementById('tabMedium').textContent = medium;
            document.getElementById('tabLow').textContent = low;
            document.getElementById('tabAll').textContent = allQuestions.length;
            
            // Update remaining count
            const reviewed = Object.keys(reviewStatus).length;
            const adopted = Object.values(reviewStatus).filter(s => s === 'adopted').length;
            const needsWork = Object.values(reviewStatus).filter(s => s === 'needs_work').length;
            
            document.getElementById('totalReviewed').textContent = reviewed;
            document.getElementById('totalAdopted').textContent = adopted;
            document.getElementById('totalNeedsWork').textContent = needsWork;
            document.getElementById('remaining').textContent = allQuestions.length - reviewed;
            
            // Progress bar
            const progress = (reviewed / allQuestions.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }
        
        function populateTopicFilter() {
            const topics = [...new Set(allQuestions.map(q => q.topic))].sort();
            const select = document.getElementById('topicFilter');
            select.innerHTML = '<option value="all">全部課題</option>';
            topics.forEach(t => {
                select.innerHTML += `<option value="${t}">${t}</option>`;
            });
        }
        
        function filterQuestions() {
            const topic = document.getElementById('topicFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            filteredQuestions = allQuestions.filter(q => {
                // Confidence filter
                if (currentFilter !== 'all' && q.final_status !== currentFilter) {
                    return false;
                }
                // Topic filter
                if (topic !== 'all' && q.topic !== topic) {
                    return false;
                }
                // Status filter
                if (status !== 'all') {
                    const qStatus = reviewStatus[q.id];
                    if (status === 'pending' && qStatus) return false;
                    if (status === 'adopted' && qStatus !== 'adopted') return false;
                    if (status === 'needs_work' && qStatus !== 'needs_work') return false;
                }
                return true;
            });
            
            currentIndex = 0;
            renderQuestions();
        }
        
        function filterByConfidence(level, btn) {
            currentFilter = level;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            filterQuestions();
        }
        
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            
            if (filteredQuestions.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:50px;color:#7f8c8d;">沒有符合條件的題目</p>';
                return;
            }
            
            container.innerHTML = filteredQuestions.map((q, idx) => {
                const status = reviewStatus[q.id] || '';
                const statusClass = q.final_status;
                const reviewClass = status === 'adopted' ? 'high-result' : status === 'needs_work' ? 'medium-result' : '';
                
                return `
                    <div class="question-card" id="q-${idx}">
                        <div class="question-header ${statusClass}">
                            <div>
                                <span class="q-id">${q.id}</span>
                                <span class="q-meta"> | ${q.year} | ${q.topic} | ${q.score}分</span>
                            </div>
                            <div style="display:flex;gap:10px;align-items:center;">
                                <span class="confidence">${(q.final_confidence * 100).toFixed(0)}%</span>
                                ${status === 'adopted' ? '<span style="background:#27ae60;padding:3px 10px;border-radius:10px;">✅ 已採用</span>' : ''}
                                ${status === 'needs_work' ? '<span style="background:#f39c12;padding:3px 10px;border-radius:10px;">⚠️ 需修改</span>' : ''}
                            </div>
                        </div>
                        <div class="question-body">
                            <div class="text-section ${reviewClass}">
                                <h4>📝 題目文字</h4>
                                <textarea id="text-${q.id}" class="ocr-text" 
                                    onchange="updateText('${q.id}', this.value)"
                                    oninput="liveUpdatePreview('${q.id}', this.value)">${q.final_text || q.ocr_text}</textarea>
                            </div>
                            
                            <div class="text-section">
                                <h4>👁️ 預覽</h4>
                                <div id="preview-${q.id}" class="preview-box" style="background:#f8f9fa;border:2px solid #667eea;border-radius:8px;padding:15px;min-height:80px;">
                                    ${escapeHtml(q.final_text || q.ocr_text)}
                                </div>
                            </div>
                            
                            <div class="status-row">
                                <label>
                                    <input type="checkbox" id="adopted-${q.id}" 
                                        ${status === 'adopted' ? 'checked' : ''} 
                                        onchange="setStatus('${q.id}', 'adopted', this.checked)">
                                    ✅ 直接採用
                                </label>
                                <label>
                                    <input type="checkbox" id="needswork-${q.id}" 
                                        ${status === 'needs_work' ? 'checked' : ''} 
                                        onchange="setStatus('${q.id}', 'needs_work', this.checked)">
                                    ⚠️ 需要修改
                                </label>
                            </div>
                            
                            <div class="btn-group">
                                <button class="adopt" onclick="adoptQuestion('${q.id}')">✅ 採用此版本</button>
                                <button class="review" onclick="markNeedsWork('${q.id}')">⚠️ 標記需修改</button>
                            </div>
                            
                            <div class="nav-buttons">
                                <button class="prev" onclick="jumpTo(${idx - 1})">⬆ 上一題</button>
                                <button class="next" onclick="jumpTo(${idx + 1})">⬇ 下一題</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }
        
        function updateText(id, text) {
            const q = allQuestions.find(q => q.id === id);
            if (q) {
                q.final_text = text;
                saveToLocalStorage();
            }
        }
        
        function liveUpdatePreview(id, text) {
            const preview = document.getElementById(`preview-${id}`);
            if (preview) {
                preview.innerHTML = escapeHtml(text);
            }
        }
        
        function setStatus(id, status, checked) {
            if (checked) {
                // Uncheck the other
                if (status === 'adopted') {
                    document.getElementById(`needswork-${id}`).checked = false;
                    reviewStatus[id] = 'adopted';
                } else {
                    document.getElementById(`adopted-${id}`).checked = false;
                    reviewStatus[id] = 'needs_work';
                }
            } else {
                delete reviewStatus[id];
            }
            
            saveToLocalStorage();
            updateStats();
            renderQuestions();
        }
        
        function adoptQuestion(id) {
            reviewStatus[id] = 'adopted';
            document.getElementById(`adopted-${id}`).checked = true;
            document.getElementById(`needswork-${id}`).checked = false;
            
            saveToLocalStorage();
            updateStats();
            showToast('已採用');
            
            // Jump to next
            jumpToNextPending();
        }
        
        function markNeedsWork(id) {
            reviewStatus[id] = 'needs_work';
            document.getElementById(`needswork-${id}`).checked = true;
            document.getElementById(`adopted-${id}`).checked = false;
            
            saveToLocalStorage();
            updateStats();
            showToast('已標記需修改');
        }
        
        function saveToLocalStorage() {
            localStorage.setItem('hkdse_phase4_review', JSON.stringify(reviewStatus));
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = `✓ ${message}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function prevQuestion() { currentIndex = Math.max(0, currentIndex - 1); scrollTo(currentIndex); }
        function nextQuestion() { currentIndex = Math.min(filteredQuestions.length - 1, currentIndex + 1); scrollTo(currentIndex); }
        function jumpTo(idx) { if (idx >= 0 && idx < filteredQuestions.length) { currentIndex = idx; scrollTo(currentIndex); } }
        
        function jumpToNextPending() {
            const idx = filteredQuestions.findIndex((q, i) => i >= currentIndex && !reviewStatus[q.id]);
            if (idx !== -1) { currentIndex = idx; scrollTo(currentIndex); }
            else {
                const first = filteredQuestions.findIndex(q => !reviewStatus[q.id]);
                if (first !== -1) { currentIndex = first; scrollTo(currentIndex); }
                else showToast('全部已審核！');
            }
        }
        
        function scrollTo(idx) {
            const el = document.getElementById(`q-${idx}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function exportResults() {
            const adopted = allQuestions.filter(q => reviewStatus[q.id] === 'adopted');
            const needsWork = allQuestions.filter(q => reviewStatus[q.id] === 'needs_work');
            
            const exportData = {
                export_date: new Date().toISOString(),
                statistics: {
                    total: allQuestions.length,
                    reviewed: Object.keys(reviewStatus).length,
                    adopted: adopted.length,
                    needs_work: needsWork.length
                },
                adopted_questions: adopted.map(q => ({
                    id: q.id,
                    year: q.year,
                    topic: q.topic,
                    final_text: q.final_text
                })),
                needs_work_questions: needsWork.map(q => ({
                    id: q.id,
                    year: q.year,
                    topic: q.topic,
                    final_text: q.final_text
                }))
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `hkdse_review_results_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast(`已匯出 ${adopted.length} 題採用 + ${needsWork.length} 題需修改`);
        }
        
        // Event listeners
        document.getElementById('topicFilter').addEventListener('change', filterQuestions);
        document.getElementById('statusFilter').addEventListener('change', filterQuestions);
        
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowUp') prevQuestion();
            if (e.key === 'ArrowDown') nextQuestion();
            if (e.key === 'n' || e.key === 'N') jumpToNextPending();
        });
        
        // Load data on page load
        loadData();
    </script>
</body>
</html>
