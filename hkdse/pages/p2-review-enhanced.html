<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE 卷二選擇題 - 增強版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #f5f5f5; padding: 20px; }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 22px; margin-bottom: 10px; }
        
        .toolbar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar select, .toolbar button {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .toolbar button {
            background: #667eea;
            color: white;
            cursor: pointer;
            border: none;
        }
        .toolbar button:hover { background: #5568d3; }
        .toolbar button.preview { background: #27ae60; }
        .toolbar button.edit { background: #f39c12; }
        
        .mode-indicator {
            padding: 8px 15px;
            background: #e0e0e0;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .mode-indicator.edit-mode { background: #fff3cd; color: #856404; }
        .mode-indicator.preview-mode { background: #d4edda; color: #155724; }
        
        .question-card {
            background: white;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .question-header {
            background: #34495e;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .question-header .q-id { font-size: 18px; font-weight: bold; }
        .question-header .q-meta { font-size: 14px; opacity: 0.9; }
        
        .question-body { padding: 20px; }
        
        .question-text {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 15px;
            line-height: 1.8;
        }
        
        .options-container {
            display: grid;
            gap: 10px;
            margin-bottom: 15px;
        }
        .option-item {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .option-label {
            min-width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        /* Edit mode */
        .edit-mode .option-item textarea {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }
        .edit-mode .option-item textarea:focus {
            border-color: #667eea;
            outline: none;
        }
        
        /* Preview mode */
        .preview-mode .option-item {
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .preview-mode .option-item.correct {
            background: #d4edda;
            border-left-color: #27ae60;
        }
        
        .answer-section {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .answer-section label {
            font-weight: bold;
            margin-right: 10px;
        }
        .answer-section select {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .svg-section {
            background: #e8f4f8;
            border: 2px solid #17a2b8;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .svg-section h4 {
            color: #17a2b8;
            margin-bottom: 10px;
        }
        .svg-section textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            resize: vertical;
        }
        .svg-preview {
            margin-top: 10px;
            text-align: center;
        }
        .svg-preview svg {
            max-width: 100%;
            background: white;
            border-radius: 8px;
            padding: 10px;
        }
        
        .image-section {
            margin-bottom: 15px;
            text-align: center;
        }
        .image-section img {
            max-width: 100%;
            max-height: 400px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .status-row {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .status-row label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .status-row input[type="checkbox"] { width: 18px; height: 18px; }
        
        .verified-badge {
            background: #27ae60;
            color: white;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .nav-buttons button {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .nav-buttons .prev { background: #e0e0e0; }
        .nav-buttons .next { background: #667eea; color: white; }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        
        .help-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            .options-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">✓ 已保存</div>
    
    <div class="header">
        <h1>📚 HKDSE 卷二選擇題 - 增強版</h1>
        <div id="stats"></div>
    </div>
    
    <div class="toolbar">
        <select id="topicFilter">
            <option value="all">全部課題</option>
        </select>
        
        <select id="yearFilter">
            <option value="all">全部年份</option>
        </select>
        
        <span class="mode-indicator edit-mode" id="modeIndicator">📝 編輯模式</span>
        
        <button onclick="toggleMode()">🔄 切換模式</button>
        <button class="edit" onclick="exportData()">💾 匯出</button>
        
        <button class="prev" onclick="prevQuestion()">⬆ 上一題</button>
        <button class="next" onclick="nextQuestion()">⬇ 下一題</button>
    </div>
    
    <div id="questionsContainer"></div>
    
    <script>
        let allQuestions = [];
        let currentIndex = 0;
        let isEditMode = true;
        
        async function loadData() {
            try {
                const response = await fetch('../ocr-output/final_merged_results.json');
                const data = await response.json();
                allQuestions = (data.p2 || []).filter(function(q) { return q.part === 'MC'; });
                
                // Load saved edits from localStorage
                const saved = localStorage.getItem('hkdse_p2_enhanced');
                if (saved) {
                    const savedData = JSON.parse(saved);
                    savedData.forEach(function(s) {
                        const idx = allQuestions.findIndex(function(q) { return q.id === s.id; });
                        if (idx !== -1) {
                            allQuestions[idx] = Object.assign({}, allQuestions[idx], s);
                        }
                    });
                }
                
                populateFilters();
                renderQuestion();
                updateStats();
            } catch (e) {
                console.error('Error loading data:', e);
                document.getElementById('questionsContainer').innerHTML = 
                    '<p style="text-align:center;padding:50px;color:#e74c3c;">無法載入數據</p>';
            }
        }
        
        function populateFilters() {
            const topics = [...new Set(allQuestions.map(function(q) { return q.topic; }))].sort();
            const years = [...new Set(allQuestions.map(function(q) { return q.year; }))].sort().reverse();
            
            const topicSelect = document.getElementById('topicFilter');
            topics.forEach(function(t) {
                topicSelect.innerHTML += '<option value="' + t + '">' + t + '</option>';
            });
            
            const yearSelect = document.getElementById('yearFilter');
            years.forEach(function(y) {
                yearSelect.innerHTML += '<option value="' + y + '">' + y + '</option>';
            });
        }
        
        function getCurrentFilters() {
            const topic = document.getElementById('topicFilter').value;
            const year = document.getElementById('yearFilter').value;
            return { topic: topic, year: year };
        }
        
        function filterQuestions() {
            const filters = getCurrentFilters();
            return allQuestions.filter(function(q) {
                if (filters.topic !== 'all' && q.topic !== filters.topic) return false;
                if (filters.year !== 'all' && q.year !== filters.year) return false;
                return true;
            });
        }
        
        function updateStats() {
            const filtered = filterQuestions();
            const verifiedCount = filtered.filter(function(q) { return q.verified; }).length;
            document.getElementById('stats').textContent = 
                '總題數: ' + filtered.length + ' | 已確認: ' + verifiedCount;
        }
        
        function parseOptions(text) {
            if (!text) return { question: '', options: { A: '', B: '', C: '', D: '' } };
            
            const lines = text.split('\n');
            const options = { A: '', B: '', C: '', D: '' };
            let currentOption = null;
            let questionText = '';
            
            for (let i = 0; i < lines.length; i++) {
                const trimmed = lines[i].trim();
                if (!trimmed) continue;
                
                // 檢測是否是選項
                const optionMatch = trimmed.match(/^([ABCD])[\.\)．].*/);
                if (optionMatch) {
                    currentOption = optionMatch[1];
                    options[currentOption] = trimmed.substring(2).trim();
                } else if (currentOption) {
                    // 繼續當前選項
                    options[currentOption] += ' ' + trimmed;
                } else {
                    // 題目文字
                    questionText += (questionText ? '\n' : '') + trimmed;
                }
            }
            
            return { question: questionText, options: options };
        }
        
        function renderQuestion() {
            const filtered = filterQuestions();
            if (filtered.length === 0) {
                document.getElementById('questionsContainer').innerHTML = 
                    '<p style="text-align:center;padding:50px;">沒有符合條件的題目</p>';
                return;
            }
            
            if (currentIndex >= filtered.length) currentIndex = filtered.length - 1;
            if (currentIndex < 0) currentIndex = 0;
            
            const q = filtered[currentIndex];
            
            // 解析選項
            if (!q.options_parsed) {
                const parsed = parseOptions(q.ai_corrected_text || q.ocr_text || '');
                q.options_parsed = parsed;
                q.options = { A: parsed.options.A, B: parsed.options.B, C: parsed.options.C, D: parsed.options.D };
                q.answer = q.answer || '';
                q.svg_data = q.svg_data || '';
            }
            
            const modeClass = isEditMode ? 'edit-mode' : 'preview-mode';
            const questionText = q.options_parsed.question || '';
            const options = q.options;
            
            let html = '<div class="question-card ' + modeClass + '">';
            html += '<div class="question-header">';
            html += '<div><span class="q-id">' + q.id + '</span><span class="q-meta"> | ' + q.year + ' | ' + q.topic + ' | ' + q.score + '分</span></div>';
            if (q.verified) {
                html += '<span class="verified-badge">✓ 已確認</span>';
            }
            html += '</div>';
            
            html += '<div class="question-body">';
            
            // 圖片
            if (q.local_url || q.image_url) {
                html += '<div class="image-section">';
                html += '<img src="' + (q.local_url || q.image_url) + '" alt="' + q.id + '" onclick="window.open(this.src)">';
                html += '<p class="help-text">點擊放大 | 版權：考評局</p>';
                html += '</div>';
            }
            
            // 題目文字
            html += '<div class="question-text"><strong>題目：</strong><br>';
            if (isEditMode) {
                html += '<textarea id="questionText" style="width:100%;min-height:80px;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;line-height:1.6;" onchange="updateQuestion(\'' + q.id + '\', \'question\', this.value)">' + escapeHtml(questionText) + '</textarea>';
            } else {
                html += '<div>' + questionText.replace(/\n/g, '<br>') + '</div>';
            }
            html += '</div>';
            
            // 選項
            html += '<div class="options-container">';
            ['A', 'B', 'C', 'D'].forEach(function(opt) {
                const isCorrect = q.answer === opt && !isEditMode;
                html += '<div class="option-item' + (isCorrect ? ' correct' : '') + '">';
                html += '<div class="option-label">' + opt + '</div>';
                if (isEditMode) {
                    html += '<textarea id="option' + opt + '" onchange="updateQuestion(\'' + q.id + '\', \'option' + opt + '\', this.value)">' + escapeHtml(options[opt] || '') + '</textarea>';
                } else {
                    html += '<div style="flex:1;">' + (options[opt] || '').replace(/\n/g, '<br>') + '</div>';
                }
                html += '</div>';
            });
            html += '</div>';
            
            // 答案
            html += '<div class="answer-section">';
            html += '<label>答案：</label>';
            if (isEditMode) {
                html += '<select id="answerSelect" onchange="updateQuestion(\'' + q.id + '\', \'answer\', this.value)">';
                html += '<option value="">請選擇</option>';
                ['A', 'B', 'C', 'D'].forEach(function(o) {
                    html += '<option value="' + o + '"' + (q.answer === o ? ' selected' : '') + '>' + o + '</option>';
                });
                html += '</select>';
            } else {
                html += '<strong>' + (q.answer || '未設定') + '</strong>';
            }
            html += '</div>';
            
            // SVG 圖形
            html += '<div class="svg-section">';
            html += '<h4>📊 SVG 圖形（可選）</h4>';
            if (isEditMode) {
                html += '<textarea id="svgData" placeholder="插入 SVG 圖形代碼..." onchange="updateQuestion(\'' + q.id + '\', \'svg\', this.value)">' + escapeHtml(q.svg_data || '') + '</textarea>';
                if (q.svg_data) {
                    html += '<div class="svg-preview">' + q.svg_data + '</div>';
                }
            } else if (q.svg_data) {
                html += '<div class="svg-preview">' + q.svg_data + '</div>';
            }
            html += '<p class="help-text">支援標準 SVG 格式，可用於概率樹、幾何圖、統計圖等</p>';
            html += '</div>';
            
            // 狀態
            html += '<div class="status-row">';
            html += '<label><input type="checkbox"' + (q.verified ? ' checked' : '') + ' onchange="updateQuestion(\'' + q.id + '\', \'verified\', this.checked)">確認正確 ✓</label>';
            html += '</div>';
            
            // 導航
            html += '<div class="nav-buttons">';
            html += '<button class="prev" onclick="prevQuestion()">⬆ 上一題</button>';
            html += '<button class="next" onclick="nextQuestion()">⬇ 下一題 (' + (currentIndex + 1) + '/' + filtered.length + ')</button>';
            html += '</div>';
            
            html += '</div></div>';
            
            document.getElementById('questionsContainer').innerHTML = html;
            
            // Update mode indicator
            const indicator = document.getElementById('modeIndicator');
            indicator.textContent = isEditMode ? '📝 編輯模式' : '👁️ 預覽模式';
            indicator.className = 'mode-indicator ' + (isEditMode ? 'edit-mode' : 'preview-mode');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        
        function toggleMode() {
            isEditMode = !isEditMode;
            renderQuestion();
        }
        
        function updateQuestion(id, field, value) {
            const q = allQuestions.find(function(q) { return q.id === id; });
            if (!q) return;
            
            if (field === 'question') {
                q.options_parsed.question = value;
                q.question_text = value;
            } else if (field.startsWith('option')) {
                const opt = field.replace('option', '');
                q.options[opt] = value;
                q.options_parsed.options[opt] = value;
            } else if (field === 'answer') {
                q.answer = value;
            } else if (field === 'svg') {
                q.svg_data = value;
            } else if (field === 'verified') {
                q.verified = value;
            }
            
            saveToLocalStorage();
            renderQuestion();
        }
        
        function saveToLocalStorage() {
            const dataToSave = allQuestions.filter(function(q) { 
                return q.verified || q.svg_data || q.options_parsed && q.options_parsed.question;
            }).map(function(q) {
                return {
                    id: q.id,
                    verified: q.verified,
                    options: q.options,
                    options_parsed: q.options_parsed,
                    answer: q.answer,
                    svg_data: q.svg_data
                };
            });
            localStorage.setItem('hkdse_p2_enhanced', JSON.stringify(dataToSave));
            showToast('✓ 已保存');
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }
        
        function prevQuestion() {
            currentIndex = Math.max(0, currentIndex - 1);
            renderQuestion();
        }
        
        function nextQuestion() {
            const filtered = filterQuestions();
            currentIndex = Math.min(filtered.length - 1, currentIndex + 1);
            renderQuestion();
        }
        
        function exportData() {
            const data = {
                export_date: new Date().toISOString(),
                total: allQuestions.length,
                questions: allQuestions.map(function(q) {
                    return {
                        id: q.id,
                        year: q.year,
                        topic: q.topic,
                        score: q.score,
                        question: q.options_parsed ? q.options_parsed.question : '',
                        options: q.options,
                        answer: q.answer,
                        svg_data: q.svg_data,
                        verified: q.verified
                    };
                })
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'hkdse_p2_enhanced_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // Event listeners
        document.getElementById('topicFilter').addEventListener('change', function() { currentIndex = 0; renderQuestion(); updateStats(); });
        document.getElementById('yearFilter').addEventListener('change', function() { currentIndex = 0; renderQuestion(); updateStats(); });
        
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
            if (e.key === 'ArrowUp') prevQuestion();
            if (e.key === 'ArrowDown') nextQuestion();
        });
        
        loadData();
    </script>
</body>
</html>
