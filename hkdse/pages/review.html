<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE 課題 - OCR 文字審核</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #f5f5f5; padding: 20px; }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header .stats { opacity: 0.9; font-size: 14px; }
        
        .filters {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters label { font-weight: 500; }
        .filters select, .filters button {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .filters button {
            background: #667eea;
            color: white;
            cursor: pointer;
            border: none;
        }
        .filters button:hover { background: #5568d3; }
        .filters button.export { background: #27ae60; }
        .filters button.export:hover { background: #229954; }
        
        .question-card {
            background: white;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .question-header {
            background: #34495e;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .question-header .q-id { font-size: 18px; font-weight: bold; }
        .question-header .q-meta { font-size: 14px; opacity: 0.9; }
        .question-header .confidence-badge {
            font-size: 12px;
            background: rgba(255,255,255,0.2);
            padding: 3px 10px;
            border-radius: 10px;
        }
        .question-header.verified { background: #27ae60; }
        
        .question-body { 
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .image-panel {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid #667eea;
        }
        
        .editor-panel {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
        }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        .tab-btn {
            padding: 8px 15px;
            border: 1px solid #ddd;
            background: #f8f9fa;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        .tab-content.active { display: block; }
        
        .ocr-text {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.8;
            font-family: inherit;
            resize: vertical;
        }
        .ocr-text:focus { border-color: #667eea; outline: none; }
        
        .preview-box {
            background: #f8f9fa;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            min-height: 80px;
        }
        .preview-box .math { font-size: 16px; line-height: 1.8; }
        
        .image-preview {
            text-align: center;
            margin-top: 10px;
        }
        .image-preview img {
            max-width: 100%;
            max-height: 500px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }
        .image-preview figcaption {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        .status-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .status-row label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .status-row input[type="checkbox"] { width: 18px; height: 18px; }
        
        .verified-badge {
            background: #27ae60;
            color: white;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .save-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .save-indicator.show { opacity: 1; }
        
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #27ae60;
            transition: width 0.3s;
            z-index: 1001;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .nav-buttons button {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .nav-buttons .prev { background: #e0e0e0; }
        .nav-buttons .next { background: #667eea; color: white; }
        
        .help-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 10px;
        }
        
        .correction-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px 15px;
            margin-top: 10px;
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .question-body { padding: 15px; }
            .tabs { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="save-indicator" id="saveIndicator">✓ 已儲存</div>
    
    <div class="header">
        <h1>📚 HKDSE 課題 OCR 審核系統</h1>
        <div class="stats">
            <span id="totalCount">總題數: 0</span> | 
            <span id="verifiedCount">已確認: 0</span> | 
            <span id="pendingCount">待處理: 0</span>
        </div>
    </div>
    
    <div class="filters">
        <label>試卷:</label>
        <select id="paperFilter">
            <option value="all">全部</option>
            <option value="P1">卷一</option>
            <option value="P2">卷二</option>
        </select>
        
        <label>課題:</label>
        <select id="topicFilter">
            <option value="all">全部課題</option>
        </select>
        
        <label>狀態:</label>
        <select id="statusFilter">
            <option value="all">全部</option>
            <option value="pending">待處理</option>
            <option value="verified">已確認</option>
            <option value="rescan">需重新掃描</option>
        </select>
        
        <button onclick="prevQuestion()">⬆ 上一題</button>
        <button onclick="nextQuestion()">⬇ 下一題</button>
        <button onclick="nextUnverified()">➡ 未確認</button>
        <button class="export" onclick="exportAndUpload('verified')">📤 已確認</button>
        <button onclick="exportAndUpload('rescan')">📤 需重掃</button>
        <button onclick="exportAndUpload('all')">📤 全部</button>
    </div>
    
    <div id="questionsContainer"></div>
    
    <script>
        let allData = { p1: [], p2: [] };
        let currentIndex = 0;
        let filteredQuestions = [];
        
        async function loadData() {
            // Try multiple paths to find the improved data
            const paths = [
                'latex_ocr_results.json',  // New LaTeX format (primary)
                '../ocr-output/latex_ocr_results.json',  // New LaTeX format
                '../ocr-output/final_merged_results.json',  // Phase 2+3 merged results
                '../ocr-output/ai_corrected_results.json', // Phase 2 results
                '../ocr-output/all_topics_ocr_results.json'  // Original
            ];
            
            let loaded = false;
            for (const path of paths) {
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        const data = await response.json();
                        
                        // Check if it's the new LaTeX format (simple key-value)
                        if (!data.p1 && !data.p2 && !Array.isArray(data)) {
                            // New format: {"2012Q01": "text", ...}
                            allData = convertLatexToReviewFormat(data);
                        } else {
                            allData = data;
                        }
                        
                        // Apply verified status from localStorage
                        const saved = localStorage.getItem('hkdse_review_v2');
                        if (saved) {
                            try {
                                const savedData = JSON.parse(saved);
                                savedData.forEach(savedQ => {
                                    const arr = savedQ.paper === 'P1' ? allData.p1 : allData.p2;
                                    const idx = arr.findIndex(q => q.id === savedQ.id);
                                    if (idx !== -1) {
                                        arr[idx].verified = savedQ.verified;
                                        arr[idx].verified_text = savedQ.verified_text;
                                    }
                                });
                            } catch (e) {
                                console.error('Error parsing localStorage:', e);
                            }
                        }
                        
                        populateTopicFilter();
                        filterQuestions();
                        updateStats();
                        document.getElementById('totalCount').textContent = 
                            `總題數: ${(allData.p1 || []).length + (allData.p2 || []).length}`;
                        loaded = true;
                        break;
                    }
                } catch (e) {
                    console.log(`Failed to load from ${path}:`, e);
                }
            }
            
            if (!loaded) {
                document.getElementById('questionsContainer').innerHTML = 
                    '<p style="text-align:center;padding:50px;color:#e74c3c;">無法載入數據</p>';
            }
        }
        
        function convertLatexToReviewFormat(latexData) {
            // Convert {"2012Q01": "text", ...} to {p1: [], p2: []}
            const p1 = [];
            const p2 = [];
            
            for (const [id, text] of Object.entries(latexData)) {
                // Parse year and question number from id like "2012Q01"
                const match = id.match(/^(\d{4})Q(\d+)$/);
                if (!match) continue;
                
                const year = parseInt(match[1]);
                const qNum = parseInt(match[2]);
                const paper = 'P1'; // All images are Paper 1
                
                // Extract topic from text
                let topic = '綜合';
                if (text.includes('因式分解')) topic = '因式分解';
                else if (text.includes('變分') || text.includes('正變') || text.includes('反變')) topic = '變分';
                else if (text.includes('概率') || text.includes('概率') || text.includes('排列') || text.includes('組合')) topic = '概率';
                else if (text.includes('軌跡')) topic = '軌跡';
                else if (text.includes('三角形') || text.includes('幾何') || text.includes('圓')) topic = '幾何';
                else if (text.includes('統計') || text.includes('平均值') || text.includes('標準差')) topic = '統計';
                else if (text.includes('不等式')) topic = '不等式';
                else if (text.includes('指數') || text.includes('對數')) topic = '指數與對數';
                else if (text.includes('方程') || text.includes('公式')) topic = '方程與公式';
                
                // Try to determine score from text
                let score = 0;
                const scoreMatch = text.match(/\((\d+)\s*[分]/);
                if (scoreMatch) score = parseInt(scoreMatch[1]);
                
                const q = {
                    id: id,
                    year: year,
                    paper: paper,
                    question_num: qNum,
                    topic: topic,
                    score: score,
                    ocr_text: text,
                    verified: false,
                    needs_rescan: false,
                    ai_confidence_score: 0.9,
                    image_url: '' // No image_url in new format
                };
                
                p1.push(q);
            }
            
            // Sort by year and question number
            p1.sort((a, b) => {
                if (a.year !== b.year) return a.year - b.year;
                return a.question_num - b.question_num;
            });
            
            return { p1, p2 };
        }
        
        function populateTopicFilter() {
            const topics = [...new Set(getAllQuestions().map(q => q.topic))].sort();
            const select = document.getElementById('topicFilter');
            select.innerHTML = '<option value="all">全部課題</option>';
            topics.forEach(t => {
                select.innerHTML += `<option value="${t}">${t}</option>`;
            });
        }
        
        function getAllQuestions() {
            return [...(allData.p1 || []), ...(allData.p2 || [])];
        }
        
        function filterQuestions() {
            const paper = document.getElementById('paperFilter').value;
            const topic = document.getElementById('topicFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            filteredQuestions = getAllQuestions().filter(q => {
                if (paper !== 'all' && q.paper !== paper) return false;
                if (topic !== 'all' && q.topic !== topic) return false;
                if (status === 'pending' && (q.verified || q.needs_rescan)) return false;
                if (status === 'verified' && !q.verified) return false;
                if (status === 'rescan' && !q.needs_rescan) return false;
                return true;
            });
            
            currentIndex = 0;
            renderQuestions();
        }
        
        function updateStats() {
            const all = getAllQuestions();
            const verified = all.filter(q => q.verified).length;
            document.getElementById('verifiedCount').textContent = `已確認: ${verified}`;
            document.getElementById('pendingCount').textContent = `待處理: ${all.length - verified}`;
            
            const progress = all.length > 0 ? (verified / all.length * 100) : 0;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }
        
        function getImageUrl(q) {
            // Use Google Drive thumbnail
            if (q.image_url) {
                const driveId = q.image_url.match(/id=([^&]+)/)?.[1];
                if (driveId) {
                    return `https://drive.google.com/thumbnail?id=${driveId}&sz=w800`;
                }
                return q.image_url;
            }
            // Use local preprocessed image
            if (q.id) {
                return `../ocr-output/preprocessed-p1/${q.id}.jpg`;
            }
            return '';
        }
        
        function getQuestionText(q) {
            // Priority: verified_text > final_text (Phase2+3) > ai_corrected_text > ocr_text
            if (q.verified && q.verified_text) return q.verified_text;
            if (q.final_text) return q.final_text;
            if (q.ai_corrected_text) return q.ai_corrected_text;
            return q.ocr_text || '';
        }
        
        function getConfidenceScore(q) {
            // Get confidence score from various possible fields
            return q.ai_confidence_score || q.final_confidence || q.confidence || 0;
        }
        
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            
            if (filteredQuestions.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:50px;color:#7f8c8d;">沒有符合條件的題目</p>';
                return;
            }
            
            container.innerHTML = filteredQuestions.map((q, idx) => {
                const questionText = getQuestionText(q);
                const confidence = getConfidenceScore(q);
                const imageUrl = getImageUrl(q);
                const paper = q.paper || (q.id.includes('Q') && q.id.includes('P') ? 
                    (q.id.includes('P1') || q.id.includes('Q0') || q.id.includes('Q1') ? 'P1' : 'P2') : 'P1');
                
                return `
                    <div class="question-card ${q.verified ? 'verified' : ''}" id="q-${idx}">
                        <div class="question-header ${q.verified ? 'verified' : ''}">
                            <div>
                                <span class="q-id">${q.id}</span>
                                <span class="q-meta"> | ${q.year || ''} | ${q.topic || ''} | ${q.score || ''}分</span>
                            </div>
                            <div style="display:flex;gap:10px;align-items:center;">
                                <span class="confidence-badge">AI: ${(confidence * 100).toFixed(0)}%</span>
                                ${q.verified ? '<span class="verified-badge">✓ 已確認</span>' : ''}
                                ${q.needs_rescan ? '<span style="background:#f39c12;color:white;padding:3px 10px;border-radius:10px;font-size:12px;">🔄 需重新掃描</span>' : ''}
                            </div>
                        </div>
                        <div class="question-body">
                            ${imageUrl ? `
                                <div class="image-panel">
                                    <h4 style="margin-bottom:10px;">🖼️ 原始試卷圖片</h4>
                                    <div class="image-preview">
                                        <img id="qimg-${q.id}" src="${imageUrl}" alt="${q.id}"
                                            onclick="window.open(this.src)"
                                            onerror="this.onerror=null; this.src='${q.image_url || imageUrl}'">
                                        <figcaption>點擊放大 | 版權：考評局</figcaption>
                                    </div>
                                </div>
                            ` : '<p style="color:#7f8c8d;">此題目沒有試卷圖片</p>'}
                            
                            <div class="editor-panel">
                                <div class="tabs">
                                    <button class="tab-btn active" onclick="switchTab('${q.id}', 'edit', this)">📝 文字</button>
                                    <button class="tab-btn" onclick="switchTab('${q.id}', 'preview', this)">👁️ 預覽</button>
                                </div>
                                
                                <div id="edit-${q.id}" class="tab-content active">
                                    <textarea id="text-${q.id}" class="ocr-text" 
                                        placeholder="輸入題目文字..."
                                        onchange="updateText('${q.id}', this.value)"
                                        oninput="liveUpdatePreview('${q.id}', this.value)">${questionText}</textarea>
                                    <div class="help-text">💡 支援 LaTeX 格式，例如：\\(x^2\\) 或 \\[ \frac{a}{b} \\]</div>
                                    
                                    ${q.ai_corrections && q.ai_corrections.length > 0 ? `
                                        <div class="correction-note">
                                            🤖 AI 自動修正: ${q.ai_corrections.map(c => `${c.from}→${c.to}`).join(', ')}
                                        </div>
                                    ` : ''}
                                    
                                    <div class="status-row">
                                        <label>
                                            <input type="checkbox" id="verify-${q.id}" 
                                                ${q.verified ? 'checked' : ''} 
                                                onchange="toggleVerified('${q.id}', this.checked)">
                                            確認文字正確 ✓
                                        </label>
                                        <label style="background:#fff3cd;">
                                            <input type="checkbox" id="rescan-${q.id}" 
                                                ${q.needs_rescan ? 'checked' : ''} 
                                                onchange="toggleRescan('${q.id}', this.checked)">
                                            需要重新掃描 🔄
                                        </label>
                                    </div>
                                    
                                    <div class="nav-buttons">
                                        <button class="prev" onclick="jumpTo(${idx - 1})">⬆ 上一題</button>
                                        <button class="next" onclick="jumpTo(${idx + 1})">⬇ 下一題</button>
                                    </div>
                                </div>
                                
                                <div id="preview-${q.id}" class="tab-content">
                                    <h4 style="margin-bottom:10px;">👁️ 數學預覽</h4>
                                    <div id="math-preview-${q.id}" class="preview-box math">
                                        ${escapeHtml(questionText)}
                                    </div>
                                    <p class="help-text">⚠️ 需要 LaTeX 格式才能正確顯示</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }
        
        function liveUpdatePreview(id, text) {
            const preview = document.getElementById(`math-preview-${id}`);
            if (preview) {
                preview.innerHTML = escapeHtml(text);
                if (window.MathJax) {
                    MathJax.typesetPromise([preview]);
                }
            }
        }
        
        function switchTab(id, tab, btn) {
            document.querySelectorAll(`[id^="edit-${id}"], [id^="preview-${id}"]`).forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll(`[onclick^="switchTab('${id}']`).forEach(b => {
                b.classList.remove('active');
            });
            
            const target = document.getElementById(`${tab}-${id}`);
            if (target) target.classList.add('active');
            if (btn) btn.classList.add('active');
            
            if (tab === 'preview' && window.MathJax) {
                MathJax.typesetPromise();
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }
        
        function updateText(id, text) {
            const all = getAllQuestions();
            const q = all.find(q => q.id === id);
            if (q) {
                q.ocr_text = text;
                if (q.verified) {
                    q.verified_text = text;
                }
                saveToLocalStorage();
                showSaveIndicator();
            }
        }
        
        function toggleVerified(id, verified) {
            const all = getAllQuestions();
            const q = all.find(q => q.id === id);
            if (q) {
                q.verified = verified;
                if (verified) {
                    q.verified_text = document.getElementById(`text-${id}`).value;
                    q.needs_rescan = false;
                    document.getElementById(`rescan-${id}`).checked = false;
                }
                const card = document.querySelector(`[id="q-${filteredQuestions.indexOf(q)}"]`);
                if (card) {
                    card.classList.toggle('verified', verified);
                    const header = card.querySelector('.question-header');
                    header.classList.toggle('verified', verified);
                    const badge = header.querySelector('.verified-badge');
                    if (verified && !badge) {
                        header.querySelector('div:last-child').innerHTML += '<span class="verified-badge">✓ 已確認</span>';
                    } else if (!verified && badge) {
                        badge.remove();
                    }
                }
                updateStats();
                saveToLocalStorage();
                showSaveIndicator();
            }
        }
        
        function toggleRescan(id, needsRescan) {
            const all = getAllQuestions();
            const q = all.find(q => q.id === id);
            if (q) {
                q.needs_rescan = needsRescan;
                if (needsRescan) {
                    q.verified = false;
                    document.getElementById(`verify-${id}`).checked = false;
                    const card = document.querySelector(`[id="q-${filteredQuestions.indexOf(q)}"]`);
                    if (card) {
                        card.classList.remove('verified');
                        const header = card.querySelector('.question-header');
                        header.classList.remove('verified');
                        const badge = header.querySelector('.verified-badge');
                        if (badge) badge.remove();
                    }
                }
                updateStats();
                saveToLocalStorage();
                showSaveIndicator();
            }
        }
        
        function showToast(message) {
            let toast = document.getElementById('upload-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'upload-toast';
                toast.style.cssText = 'position:fixed;top:20px;right:20px;background:#333;color:white;padding:15px 20px;border-radius:8px;font-size:14px;z-index:9999;transition:opacity 0.3s;';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }
        
        function saveToLocalStorage(showIndicator = true) {
            localStorage.setItem('hkdse_review_v2', JSON.stringify(getAllQuestions()));
            if (showIndicator) showSaveIndicator();
        }
        
        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.textContent = '✓ 已儲存 ' + new Date().toLocaleTimeString('zh-HK');
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 2000);
        }
        
        setInterval(() => {
            const verified = getAllQuestions().filter(q => q.verified);
            if (verified.length > 0) saveToLocalStorage(false);
        }, 30000);
        
        function exportVerified() {
            const all = getAllQuestions();
            const verified = all.filter(q => q.verified);
            
            if (verified.length === 0) {
                alert('沒有已確認的題目！');
                return;
            }
            
            const exportData = {
                export_date: new Date().toISOString(),
                type: 'verified',
                total: verified.length,
                topic: document.getElementById('topicFilter').value || 'all',
                questions: verified.map(q => ({
                    id: q.id, 
                    year: q.year, 
                    paper: q.paper, 
                    part: q.part,
                    question_num: q.question_num, 
                    topic: q.topic, 
                    score: q.score,
                    question_text: q.verified_text || getQuestionText(q),
                    image_url: q.image_url
                }))
            };
            
            downloadAsJson(exportData, `hkdse_verified_${getDateString()}.json`);
        }
        
        function exportNeedsRescan() {
            const all = getAllQuestions();
            const needsRescan = all.filter(q => q.needs_rescan);
            
            if (needsRescan.length === 0) {
                alert('沒有需要重新掃描的題目！');
                return;
            }
            
            const exportData = {
                export_date: new Date().toISOString(),
                type: 'needs_rescan',
                total: needsRescan.length,
                topic: document.getElementById('topicFilter').value || 'all',
                questions: needsRescan.map(q => ({
                    id: q.id, 
                    year: q.year, 
                    paper: q.paper, 
                    topic: q.topic, 
                    score: q.score,
                    ocr_text: getQuestionText(q),
                    image_url: q.image_url
                }))
            };
            
            downloadAsJson(exportData, `hkdse_needs_rescan_${getDateString()}.json`);
        }
        
        function downloadAllQuestions() {
            const all = getAllQuestions();
            const exportData = {
                export_date: new Date().toISOString(),
                type: 'all_questions',
                total: all.length,
                statistics: {
                    verified: all.filter(q => q.verified).length,
                    needs_rescan: all.filter(q => q.needs_rescan).length,
                    pending: all.filter(q => !q.verified && !q.needs_rescan).length
                },
                questions: all.map(q => ({
                    id: q.id, 
                    year: q.year, 
                    paper: q.paper, 
                    topic: q.topic, 
                    score: q.score,
                    question_text: q.verified_text || getQuestionText(q),
                    ai_confidence: getConfidenceScore(q),
                    status: q.verified ? 'verified' : (q.needs_rescan ? 'needs_rescan' : 'pending'),
                    image_url: q.image_url
                }))
            };
            
            downloadAsJson(exportData, `hkdse_all_questions_${getDateString()}.json`);
        }
        
        function getDateString() {
            return new Date().toISOString().split('T')[0];
        }
        
        // ========================================
        // Google Apps Script Web App URL
        // ========================================
        const UPLOAD_API_URL = 'https://script.google.com/macros/s/AKfycbyFoti709FMeYoZQAHsbWT7cW7jXp1x5vAaJydJWtVjk6BDiiCGqgbGvFxnoxPvgHNT/exec';
        // ========================================
        
        function downloadAsJson(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function uploadToDrive(data, type) {
            if (!UPLOAD_API_URL) {
                showToast('❌ 未設置上傳功能！');
                return;
            }
            
            showToast('⏳ 上載中...');
            
            // 使用 fetch 發送 JSON 到 GAS
            // 使用 text/plain 避免 CORS preflight
            fetch(UPLOAD_API_URL, {
                method: 'POST',
                mode: 'cors',  // 嘗試標準 CORS
                headers: {
                    'Content-Type': 'text/plain'
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.ok) {
                    showToast(`✅ 完成上載 (${data.total || 0}題)`);
                } else {
                    throw new Error('Upload failed');
                }
            })
            .catch(err => {
                // 如果 CORS 失敗，嘗試 no-cors 模式
                showToast('⏳ 重試中...');
                fetch(UPLOAD_API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                setTimeout(() => {
                    showToast(`✅ 完成上載 (${data.total || 0}題)`);
                }, 2000);
            });
        }
        
        async function exportAndUpload(type) {
            const all = getAllQuestions();
            let data;
            let filename;
            
            if (type === 'verified') {
                const verified = all.filter(q => q.verified);
                if (verified.length === 0) {
                    alert('沒有已確認的題目！');
                    return;
                }
                data = {
                    type: 'verified',
                    export_date: new Date().toISOString(),
                    total: verified.length,
                    topic: document.getElementById('topicFilter').value || 'all',
                    questions: verified.map(q => ({
                        id: q.id, year: q.year, paper: q.paper, part: q.part,
                        question_num: q.question_num, topic: q.topic, score: q.score,
                        question_text: q.verified_text || getQuestionText(q),
                        image_url: q.image_url
                    }))
                };
                filename = `hkdse_verified_${getDateString()}.json`;
                
            } else if (type === 'rescan') {
                const needsRescan = all.filter(q => q.needs_rescan);
                if (needsRescan.length === 0) {
                    alert('沒有需要重新掃描的題目！');
                    return;
                }
                data = {
                    type: 'needs_rescan',
                    export_date: new Date().toISOString(),
                    total: needsRescan.length,
                    questions: needsRescan.map(q => ({
                        id: q.id, year: q.year, paper: q.paper,
                        topic: q.topic, score: q.score,
                        ocr_text: getQuestionText(q),
                        image_url: q.image_url
                    }))
                };
                filename = `hkdse_needs_rescan_${getDateString()}.json`;
                
            } else {
                data = {
                    type: 'all',
                    export_date: new Date().toISOString(),
                    total: all.length,
                    statistics: {
                        verified: all.filter(q => q.verified).length,
                        needs_rescan: all.filter(q => q.needs_rescan).length,
                        pending: all.filter(q => !q.verified && !q.needs_rescan).length
                    },
                    questions: all.map(q => ({
                        id: q.id, year: q.year, paper: q.paper,
                        topic: q.topic, score: q.score,
                        question_text: q.verified_text || getQuestionText(q),
                        ai_confidence: getConfidenceScore(q),
                        status: q.verified ? 'verified' : (q.needs_rescan ? 'needs_rescan' : 'pending'),
                        image_url: q.image_url
                    }))
                };
                filename = `hkdse_all_${getDateString()}.json`;
            }
            
            // 只上傳，不下載
            uploadToDrive(data, type);
        }
        
        function prevQuestion() { currentIndex = Math.max(0, currentIndex - 1); scrollTo(currentIndex); }
        function nextQuestion() { currentIndex = Math.min(filteredQuestions.length - 1, currentIndex + 1); scrollTo(currentIndex); }
        function jumpTo(idx) { if (idx >= 0 && idx < filteredQuestions.length) { currentIndex = idx; scrollTo(currentIndex); } }
        
        function nextUnverified() {
            const idx = filteredQuestions.findIndex((q, i) => i >= currentIndex && !q.verified && !q.needs_rescan);
            if (idx !== -1) { currentIndex = idx; scrollTo(currentIndex); }
            else {
                const first = filteredQuestions.findIndex(q => !q.verified && !q.needs_rescan);
                if (first !== -1) { currentIndex = first; scrollTo(currentIndex); }
                else alert('所有可處理題目都已完成（已確認或需重新掃描）！');
            }
        }
        
        function scrollTo(idx) {
            const el = document.getElementById(`q-${idx}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        // Event listeners
        document.getElementById('paperFilter').addEventListener('change', filterQuestions);
        document.getElementById('topicFilter').addEventListener('change', filterQuestions);
        document.getElementById('statusFilter').addEventListener('change', filterQuestions);
        
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowUp') prevQuestion();
            if (e.key === 'ArrowDown') nextQuestion();
            if (e.key === 'n' || e.key === 'N') nextUnverified();
        });
        
        loadData();
    </script>
</body>
