<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE 課題 - OCR 文字審核</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #f5f5f5; padding: 20px; }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header .stats { opacity: 0.9; font-size: 14px; }
        
        .filters {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters label { font-weight: 500; }
        .filters select, .filters button {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .filters button {
            background: #667eea;
            color: white;
            cursor: pointer;
            border: none;
        }
        .filters button:hover { background: #5568d3; }
        .filters button.export { background: #27ae60; }
        .filters button.export:hover { background: #229954; }
        
        .question-card {
            background: white;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .question-header {
            background: #34495e;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .question-header .q-id { font-size: 18px; font-weight: bold; }
        .question-header .q-meta { font-size: 14px; opacity: 0.9; }
        .question-header.verified { background: #27ae60; }
        
        .question-body { padding: 20px; }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        .tab-btn {
            padding: 8px 15px;
            border: 1px solid #ddd;
            background: #f8f9fa;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        .tab-content.active { display: block; }
        
        .ocr-text {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.8;
            font-family: inherit;
            resize: vertical;
        }
        .ocr-text:focus { border-color: #667eea; outline: none; }
        
        .preview-box {
            background: #f8f9fa;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            min-height: 80px;
        }
        .preview-box .math { font-size: 16px; line-height: 1.8; }
        
        .image-preview {
            text-align: center;
            margin-top: 10px;
        }
        .image-preview img {
            max-width: 100%;
            max-height: 400px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        .image-preview figcaption {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        .status-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .status-row label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .status-row input[type="checkbox"] { width: 18px; height: 18px; }
        
        .verified-badge {
            background: #27ae60;
            color: white;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .save-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .save-indicator.show { opacity: 1; }
        
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #27ae60;
            transition: width 0.3s;
            z-index: 1001;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .nav-buttons button {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .nav-buttons .prev { background: #e0e0e0; }
        .nav-buttons .next { background: #667eea; color: white; }
        
        .help-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            .question-body { padding: 15px; }
            .tabs { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="save-indicator" id="saveIndicator">✓ 已儲存</div>
    
    <div class="header">
        <h1>📚 HKDSE 課題 OCR 審核系統</h1>
        <div class="stats">
            <span id="totalCount">總題數: 0</span> | 
            <span id="verifiedCount">已確認: 0</span> | 
            <span id="pendingCount">待處理: 0</span>
        </div>
    </div>
    
    <div class="filters">
        <label>試卷:</label>
        <select id="paperFilter">
            <option value="all">全部</option>
            <option value="P1">卷一</option>
            <option value="P2">卷二</option>
        </select>
        
        <label>課題:</label>
        <select id="topicFilter">
            <option value="all">全部課題</option>
        </select>
        
        <label>狀態:</label>
        <select id="statusFilter">
            <option value="all">全部</option>
            <option value="pending">待處理</option>
            <option value="verified">已確認</option>
        </select>
        
        <button onclick="prevQuestion()">⬆ 上一題</button>
        <button onclick="nextQuestion()">⬇ 下一題</button>
        <button onclick="nextUnverified()">➡ 未確認</button>
        <button class="export" onclick="exportVerified()">💾 匯出</button>
    </div>
    
    <div id="questionsContainer"></div>
    
    <script>
        let allData = { p1: [], p2: [] };
        let currentIndex = 0;
        let filteredQuestions = [];
        
        // Embedded verified questions
        const EMBEDDED_VERIFIED = {
            "2012Q16": {
                id: "2012Q16", year: "2012", part: "B", question_num: "16",
                topic: "高中概率", score: "4", paper: "P1",
                image_url: "https://drive.google.com/uc?id=16cu2OcT44O3vC2fmgaPKUL0kkNCqp5vU",
                ocr_text: "某公司有 8 個部門。每個部門各提名 2 位代表以成立一個有 16 位成員的工作小組。從該工作小組中隨機選出 4 位成員。\n(a) 求所選出的 4 位成員由 4 個不同部門提名的概率。\n(b) 求所選出的 4 位成員至多由 3 個不同部門提名的概率。",
                verified: true,
                verified_text: "某公司有 8 個部門。每個部門各提名 2 位代表以成立一個有 16 位成員的工作小組。從該工作小組中隨機選出 4 位成員。\n(a) 求所選出的 4 位成員由 4 個不同部門提名的概率。\n(b) 求所選出的 4 位成員至多由 3 個不同部門提名的概率。"
            },
            "2013Q10": {
                id: "2013Q10", year: "2013", part: "A2", question_num: "10",
                topic: "初中概率", score: "6", paper: "P1",
                image_url: "https://drive.google.com/uc?id=1cqs95MEMljk-CP9ECtk_lSTofH6kRdae",
                ocr_text: "A委員會的委員年歲如下 :\n17 18 21 21 22 22 23 23 23 31 31 34 35 36 47 47 58 68 69 69\n(a) 寫出 A 委員會的委員年歲的中位數及眾數。\n(b) 下面的幹葉圖顯示 B 委員會的委員年歲的分佈。已知這分佈的分佈域為 47 。\n幹(十位)|葉(個位)\n2|a 5 6 7\n3|3 3 8\n4|3\n5|1 2 9\n6|7 b\n(i) 求 a 及 b 。\n(ii) 現從每個委員會中，各隨機選出一名委員作該委員會的代表。當該兩名代表的年歲之差超過 40 時，他們便可參加某比賽。求這兩名代表可參加該比賽的概率。",
                verified: true,
                verified_text: "A委員會的委員年歲如下 :\n17 18 21 21 22 22 23 23 23 31 31 34 35 36 47 47 58 68 69 69\n(a) 寫出 A 委員會的委員年歲的中位數及眾數。\n(b) 下面的幹葉圖顯示 B 委員會的委員年歲的分佈。已知這分佈的分佈域為 47 。\n幹(十位)|葉(個位)\n2|a 5 6 7\n3|3 3 8\n4|3\n5|1 2 9\n6|7 b\n(i) 求 a 及 b 。\n(ii) 現從每個委員會中，各隨機選出一名委員作該委員會的代表。當該兩名代表的年歲之差超過 40 時，他們便可參加某比賽。求這兩名代表可參加該比賽的概率。"
            },
            "2013Q16": {
                id: "2013Q16", year: "2013", part: "B", question_num: "16",
                topic: "高中概率", score: "4", paper: "P1",
                image_url: "https://drive.google.com/uc?id=1dFF1nNzYc4tOUJFaT43CCRW7AFyk1qPa",
                ocr_text: "某盒子內有 5 個白色杯及 11 個藍色杯。若從該盒子中隨機同時抽出 6 個杯。\n(a) 求抽出至少 4 個白色杯的概率。\n(b) 求抽出至少 3 個藍色杯的概率。",
                verified: true,
                verified_text: "某盒子內有 5 個白色杯及 11 個藍色杯。若從該盒子中隨機同時抽出 6 個杯。\n(a) 求抽出至少 4 個白色杯的概率。\n(b) 求抽出至少 3 個藍色杯的概率。"
            }
        };
        
        let lastSaved = localStorage.getItem('hkdse_probability_lastSaved');
        
        async function loadData() {
            try {
                const response = await fetch('all_topics_ocr_results.json');
                allData = await response.json();
                
                // Merge embedded verified
                for (const q of Object.values(EMBEDDED_VERIFIED)) {
                    const arr = q.paper === 'P1' ? allData.p1 : allData.p2;
                    const idx = arr.findIndex(existing => existing.id === q.id);
                    if (idx !== -1) {
                        arr[idx] = {...arr[idx], ...q};
                    }
                }
                
                populateTopicFilter();
                filterQuestions();
                document.getElementById('totalCount').textContent = 
                    `總題數: ${allData.total || (allData.p1.length + allData.p2.length)}`;
            } catch (e) {
                console.error('Error loading data:', e);
                try {
                    const response = await fetch('../ocr-output/all_topics_ocr_results.json');
                    allData = await response.json();
                    populateTopicFilter();
                    filterQuestions();
                } catch (e2) {
                    console.error('Error loading from parent:', e2);
                }
            }
        }
        
        function populateTopicFilter() {
            const topics = [...new Set(getAllQuestions().map(q => q.topic))].sort();
            const select = document.getElementById('topicFilter');
            select.innerHTML = '<option value="all">全部課題</option>';
            topics.forEach(t => {
                select.innerHTML += `<option value="${t}">${t}</option>`;
            });
        }
        
        function getAllQuestions() {
            return [...allData.p1 || [], ...allData.p2 || []];
        }
        
        function filterQuestions() {
            const paper = document.getElementById('paperFilter').value;
            const topic = document.getElementById('topicFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            filteredQuestions = getAllQuestions().filter(q => {
                if (paper !== 'all' && q.paper !== paper) return false;
                if (topic !== 'all' && q.topic !== topic) return false;
                if (status === 'pending' && q.verified) return false;
                if (status === 'verified' && !q.verified) return false;
                return true;
            });
            
            currentIndex = 0;
            renderQuestions();
            updateStats();
        }
        
        function updateStats() {
            const all = getAllQuestions();
            const verified = all.filter(q => q.verified).length;
            document.getElementById('verifiedCount').textContent = `已確認: ${verified}`;
            document.getElementById('pendingCount').textContent = `待處理: ${all.length - verified}`;
            
            const progress = all.length > 0 ? (verified / all.length * 100) : 0;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }
        
        function getImageUrl(q) {
            // Prefer Google Drive URL
            if (q.image_url) return q.image_url;
            // Fallback to local path (won't work on GitHub Pages)
            return q.image_path || '';
        }
        
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            
            if (filteredQuestions.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:50px;color:#7f8c8d;">沒有符合條件的題目</p>';
                return;
            }
            
            container.innerHTML = filteredQuestions.map((q, idx) => `
                <div class="question-card ${q.verified ? 'verified' : ''}" id="q-${idx}">
                    <div class="question-header ${q.verified ? 'verified' : ''}">
                        <div>
                            <span class="q-id">${q.id}</span>
                            <span class="q-meta"> | ${q.year} | ${q.paper} | ${q.topic} | ${q.score}分</span>
                        </div>
                        <div>
                            ${q.verified ? '<span class="verified-badge">✓ 已確認</span>' : ''}
                        </div>
                    </div>
                    <div class="question-body">
                        <div class="tabs">
                            <button class="tab-btn active" onclick="switchTab('${q.id}', 'edit', this)">📝 編輯</button>
                            <button class="tab-btn" onclick="switchTab('${q.id}', 'preview', this)">👁️ 預覽</button>
                            <button class="tab-btn" onclick="switchTab('${q.id}', 'image', this)">🖼️ 圖片</button>
                        </div>
                        
                        <div id="edit-${q.id}" class="tab-content active">
                            <textarea id="text-${q.id}" class="ocr-text" 
                                placeholder="輸入題目文字..."
                                onchange="updateText('${q.id}', this.value)">${q.verified ? (q.verified_text || q.ocr_text) : q.ocr_text}</textarea>
                            <div class="help-text">💡 文字框支援 LaTeX 數學語法，例如：\\(x^2\\) 或 \\[ \frac{a}{b} \\]</div>
                            
                            <div class="status-row">
                                <label>
                                    <input type="checkbox" id="verify-${q.id}" 
                                        ${q.verified ? 'checked' : ''} 
                                        onchange="toggleVerified('${q.id}', this.checked)">
                                    確認文字正確 ✓
                                </label>
                            </div>
                        </div>
                        
                        <div id="preview-${q.id}" class="tab-content">
                            <h4 style="margin-bottom:10px;">👁️ 數學預覽（MathJax 渲染）</h4>
                            <div id="math-preview-${q.id}" class="preview-box math">
                                ${escapeHtml(q.verified ? (q.verified_text || q.ocr_text) : q.ocr_text)}
                            </div>
                            <p class="help-text">⚠️ OCR 文字需要轉換為 LaTeX 格式才能正確顯示數學符號</p>
                        </div>
                        
                        <div id="image-${q.id}" class="tab-content">
                            <h4 style="margin-bottom:10px;">🖼️ 原始試卷圖片</h4>
                            ${q.image_url ? `
                                <div class="image-preview">
                                    <img src="${q.image_url}" alt="${q.id}" 
                                        onerror="this.src='https://via.placeholder.com/400x300?text=圖片載入失敗'">
                                    <figcaption>點擊圖片可放大 | 版權：考評局</figcaption>
                                </div>
                            ` : '<p style="color:#7f8c8d;">此題目沒有試卷圖片</p>'}
                        </div>
                        
                        <div class="nav-buttons">
                            <button class="prev" onclick="jumpTo(${idx - 1})">⬆ 上一題</button>
                            <button class="next" onclick="jumpTo(${idx + 1})">⬇ 下一題</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Re-render MathJax for visible previews
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }
        
        function switchTab(id, tab, btn) {
            // Hide all tabs
            document.querySelectorAll(`[id^="edit-${id}"], [id^="preview-${id}"], [id^="image-${id}"]`).forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll(`[onclick^="switchTab('${id}']`).forEach(b => {
                b.classList.remove('active');
            });
            
            // Show selected tab
            const target = document.getElementById(`${tab}-${id}`);
            if (target) {
                target.classList.add('active');
            }
            if (btn) {
                btn.classList.add('active');
            }
            
            // Re-render MathJax if switching to preview
            if (tab === 'preview' && window.MathJax) {
                MathJax.typesetPromise();
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }
        
        function updateText(id, text) {
            const all = getAllQuestions();
            const q = all.find(q => q.id === id);
            if (q) {
                q.ocr_text = text;
                if (q.verified) {
                    q.verified_text = text;
                }
                saveToLocalStorage();
                showSaveIndicator();
            }
        }
        
        function toggleVerified(id, verified) {
            const all = getAllQuestions();
            const q = all.find(q => q.id === id);
            if (q) {
                q.verified = verified;
                if (verified) {
                    q.verified_text = document.getElementById(`text-${id}`).value;
                }
                const card = document.querySelector(`[id="q-${filteredQuestions.indexOf(q)}"]`);
                if (card) {
                    card.classList.toggle('verified', verified);
                    const header = card.querySelector('.question-header');
                    header.classList.toggle('verified', verified);
                    const badge = header.querySelector('.verified-badge');
                    if (verified && !badge) {
                        header.querySelector('div:last-child').innerHTML = '<span class="verified-badge">✓ 已確認</span>';
                    } else if (!verified && badge) {
                        badge.remove();
                    }
                }
                updateStats();
                saveToLocalStorage();
                showSaveIndicator();
            }
        }
        
        function saveToLocalStorage(showIndicator = true) {
            localStorage.setItem('hkdse_probability_review', JSON.stringify(getAllQuestions()));
            const now = new Date().toLocaleTimeString('zh-HK');
            localStorage.setItem('hkdse_probability_lastSaved', now);
            if (showIndicator) showSaveIndicator();
        }
        
        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.textContent = '✓ 已儲存 ' + new Date().toLocaleTimeString('zh-HK');
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 2000);
        }
        
        setInterval(() => {
            const verified = getAllQuestions().filter(q => q.verified || q.verified_text);
            if (verified.length > 0) saveToLocalStorage(false);
        }, 30000);
        
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('hkdse_probability_review');
            if (saved) {
                const savedData = JSON.parse(saved);
                const all = getAllQuestions();
                savedData.forEach(savedQ => {
                    const q = all.find(q => q.id === savedQ.id);
                    if (q) {
                        q.verified = savedQ.verified;
                        q.verified_text = savedQ.verified_text;
                    }
                });
            }
        }
        
        function exportVerified() {
            const all = getAllQuestions();
            const verified = all.filter(q => q.verified);
            
            if (verified.length === 0) {
                alert('沒有已確認的題目！');
                return;
            }
            
            const exportData = {
                export_date: new Date().toISOString(),
                total_verified: verified.length,
                questions: verified.map(q => ({
                    id: q.id, year: q.year, paper: q.paper, part: q.part,
                    question_num: q.question_num, topic: q.topic, score: q.score,
                    question_text: q.verified_text || q.ocr_text,
                    image_url: q.image_url
                }))
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `hkdse_verified_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            navigator.clipboard.writeText(JSON.stringify(exportData, null, 2));
            alert(`已匯出 ${verified.length} 題已確認題目！`);
        }
        
        function prevQuestion() { currentIndex = Math.max(0, currentIndex - 1); scrollTo(currentIndex); }
        function nextQuestion() { currentIndex = Math.min(filteredQuestions.length - 1, currentIndex + 1); scrollTo(currentIndex); }
        function jumpTo(idx) { if (idx >= 0 && idx < filteredQuestions.length) { currentIndex = idx; scrollTo(currentIndex); } }
        
        function nextUnverified() {
            const idx = filteredQuestions.findIndex((q, i) => i >= currentIndex && !q.verified);
            if (idx !== -1) { currentIndex = idx; scrollTo(currentIndex); }
            else {
                const first = filteredQuestions.findIndex(q => !q.verified);
                if (first !== -1) { currentIndex = first; scrollTo(currentIndex); }
                else alert('所有題目都已確認！');
            }
        }
        
        function scrollTo(idx) {
            const el = document.getElementById(`q-${idx}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        // Event listeners
        document.getElementById('paperFilter').addEventListener('change', filterQuestions);
        document.getElementById('topicFilter').addEventListener('change', filterQuestions);
        document.getElementById('statusFilter').addEventListener('change', filterQuestions);
        
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowUp') prevQuestion();
            if (e.key === 'ArrowDown') nextQuestion();
            if (e.key === 'n' || e.key === 'N') nextUnverified();
        });
        
        window.addEventListener('beforeunload', function(e) {
            const verified = getAllQuestions().filter(q => q.verified);
            if (verified.length > 0) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
        
        loadData().then(() => {
            loadFromLocalStorage();
            updateStats();
        });
    </script>
</body>
</html>
