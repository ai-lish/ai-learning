<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE 數學題解：二次函數與 x 軸截距</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>MathJax = {tex: {inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']]}};</script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        .step-content { transition: max-height 0.5s, opacity 0.3s; overflow: hidden; }
        .step-content.collapsed { max-height: 0; opacity: 0; }
        .step-content.expanded { max-height: 1200px; opacity: 1; }
        .mark-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; margin-left: 8px; }
        .mark-m { background: #fef08a; color: #854d0e; border: 1px solid #eab308; }
        .mark-a { background: #bbf7d0; color: #166534; border: 1px solid #22c55e; }
    </style>
</head>
<body class="bg-gray-50">
    <header class="bg-blue-900 text-white p-4">
        <h1 class="text-xl font-bold">DSE 數學科：二次函數圖像分析</h1>
    </header>
    <main class="p-6">
        <div class="bg-white shadow-lg rounded-xl p-6 mb-6 border-l-4 border-blue-500">
            <h2 class="font-bold">題目 (4分)</h2>
            <p>若二次函數 $y = mx^2 - 2(m + 10)x + 2m + 5$ 的圖像沒有 $x$ 軸截距，求 $m$ 值的範圍。</p>
        </div>
        <div class="space-y-4">
            <div class="border rounded-lg">
                <button onclick="toggleStep(1)" class="w-full text-left px-5 py-3 bg-blue-50 font-bold">步驟一：理解題意</button>
                <div id="step-1" class="step-content expanded px-5 py-4">
                    <p>「沒有 $x$ 軸截距」= 判別式 $\Delta < 0$ <span class="mark-badge mark-m">1M</span></p>
                </div>
            </div>
            <div class="border rounded-lg">
                <button onclick="toggleStep(2)" class="w-full text-left px-5 py-3 bg-gray-50 font-bold">步驟二：代入判別式</button>
                <div id="step-2" class="step-content collapsed px-5 py-4">
                    <p>$[-2(m+10)]^2 - 4(m)(2m+5) < 0$</p>
                    <p>$-4m^2 + 60m + 400 < 0$ <span class="mark-badge mark-m">1M</span></p>
                </div>
            </div>
            <div class="border rounded-lg">
                <button onclick="toggleStep(3)" class="w-full text-left px-5 py-3 bg-gray-50 font-bold">步驟三：解不等式</button>
                <div id="step-3" class="step-content collapsed px-5 py-4">
                    <p>$m^2 - 15m - 100 > 0$</p>
                    <p>$(m - 20)(m + 5) > 0$</p>
                    <p class="font-bold text-green-700 mt-2">$m > 20$ 或 $m < -5$ <span class="mark-badge mark-a">1A</span></p>
                </div>
            </div>
        </div>
    </main>
    <script>
        function toggleStep(n) {
            var el = document.getElementById('step-' + n);
            el.classList.toggle('collapsed');
            el.classList.toggle('expanded');
        }
    </script>
</body>
</html>
