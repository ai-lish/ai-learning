<svg width="450" height="350" viewBox="0 0 450 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Q28: 三棱柱 -->
  <text x="225" y="25" font-size="14" text-anchor="middle">Q28: 三棱柱 (Triangular Prism)</text>
  
  <!-- 3D Triangular Prism -->
  <!-- Front triangle (right-angled) -->
  <polygon points="100,300 200,300 100,200" fill="#e0e0e0" stroke="black" stroke-width="2"/>
  
  <!-- Back triangle -->
  <polygon points="180,100 280,100 180,200" fill="none" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Connecting edges -->
  <line x1="100" y1="300" x2="180" y2="100" stroke="black" stroke-width="2"/>
  <line x1="200" y1="300" x2="280" y2="100" stroke="black" stroke-width="2"/>
  <line x1="100" y1="200" x2="180" y2="200" stroke="black" stroke-width="2"/>
  
  <!-- Labels -->
  <text x="95" y="195" font-size="12" fill="blue">A</text>
  <text x="205" y="295" font-size="12" fill="blue">B</text>
  <text x="95" y="305" font-size="12" fill="blue">C</text>
  
  <text x="175" y="95" font-size="12" fill="red">A'</text>
  <text x="285" y="95" font-size="12" fill="red">B'</text>
  <text x="175" y="205" font-size="12" fill="red">C'</text>
  
  <!-- Right angle marker at A -->
  <path d="M100 220 L100 210 L110 210 L110 220" fill="none" stroke="black" stroke-width="1.5"/>
  
  <!-- Dimension labels -->
  <text x="150" y="320" font-size="12" text-anchor="middle">底邊</text>
  <text x="65" y="250" font-size="12">高</text>
  <text x="240" y="50" font-size="12" text-anchor="middle">長度</text>
  
  <!-- Surface areas -->
  <text x="350" y="80" font-size="12">側面1: 75 cm²</text>
  <text x="350" y="100" font-size="12">側面2: 180 cm²</text>
  <text x="350" y="120" font-size="12">側面3: 195 cm²</text>
  <text x="350" y="150" font-size="12">底面: 30 cm² × 2</text>
  
  <text x="350" y="200" font-size="14" font-weight="bold">總表面積:</text>
  <text x="350" y="225" font-size="14" font-weight="bold">75+180+195+60</text>
  <text x="350" y="250" font-size="14" font-weight="bold">= 510 cm²</text>
</svg>