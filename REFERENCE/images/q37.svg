<svg width="400" height="350" viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Q37: 直角三角形ABC -->
  <text x="200" y="25" font-size="14" text-anchor="middle">Q37: 直角三角形 (求h)</text>
  
  <!-- Triangle ABC (right-angled at A) -->
  <polygon points="50,300 350,300 50,50" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Height from A to BC (hypotenuse) -->
  <line x1="50" y1="50" x2="200" y2="300" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Right angle at A -->
  <path d="M50 80 L50 70 L60 70 L60 80" fill="none" stroke="black" stroke-width="1.5"/>
  
  <!-- Labels -->
  <text x="40" y="45" font-size="14" fill="blue">A</text>
  <text x="360" y="305" font-size="14" fill="blue">B</text>
  <text x="40" y="305" font-size="14" fill="blue">C</text>
  
  <!-- Height label -->
  <text x="110" y="180" font-size="14" fill="red">h</text>
  
  <!-- Dimensions on sides -->
  <text x="35" y="180" font-size="12">16cm</text>
  <text x="50" y="330" font-size="12">12cm</text>
  <text x="200" y="330" font-size="12">20cm (斜邊)</text>
  
  <!-- Right angle at C -->
  <path d="M50 280 L50 290 L60 290" fill="none" stroke="black" stroke-width="1.5"/>
  
  <!-- Formula -->
  <text x="200" y="370" font-size="12" text-anchor="middle">面積 = (AB × AC) / 2 = (BC × h) / 2</text>
  <text x="200" y="390" font-size="12" text-anchor="middle">h = (16 × 12) / 20 = 9.6 cm</text>
</svg>