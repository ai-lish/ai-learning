<svg width="450" height="350" viewBox="0 0 450 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Q36: 陰影面積 - 大三角形內含矩形 -->
  <text x="225" y="25" font-size="14" text-anchor="middle">Q36: 陰影區域面積</text>
  
  <!-- Large triangle ABC -->
  <polygon points="50,300 400,300 50,50" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Inner rectangle FGDE (white) -->
  <rect x="130" y="180" width="160" height="120" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Shaded regions (three triangles) -->
  <!-- Top small triangle: A-F-E -->
  <polygon points="50,50 130,180 290,180" fill="#cccccc" stroke="none" opacity="0.5"/>
  
  <!-- Left small triangle: F-A-D -->
  <polygon points="50,50 130,180 50,300" fill="#cccccc" stroke="none" opacity="0.5"/>
  
  <!-- Right small triangle: E-B-G -->
  <polygon points="290,180 400,300 50,300" fill="#cccccc" stroke="none" opacity="0.5"/>
  
  <!-- Labels -->
  <text x="40" y="45" font-size="14" fill="blue">A</text>
  <text x="405" y="305" font-size="14" fill="blue">B</text>
  <text x="40" y="305" font-size="14" fill="blue">C</text>
  
  <!-- Rectangle labels -->
  <text x="125" y="175" font-size="12" fill="blue">F</text>
  <text x="295" y="175" font-size="12" fill="blue">E</text>
  <text x="295" y="305" font-size="12" fill="blue">G</text>
  <text x="125" y="305" font-size="12" fill="blue">D</text>
  
  <!-- Dimensions -->
  <text x="225" y="325" font-size="12" text-anchor="middle">20cm</text>
  <text x="20" y="180" font-size="12">13cm</text>
  
  <!-- Rectangle dimensions -->
  <text x="210" y="175" font-size="12" text-anchor="middle">8cm</text>
  <text x="295" y="245" font-size="12" text-anchor="middle">6cm</text>
  
  <!-- Right angle markers -->
  <path d="M50 70 L50 80 L60 80" fill="none" stroke="black"/>
  <path d="M130 180 L130 170 L140 180" fill="none" stroke="black"/>
  <path d="M290 180 L290 170 L300 180" fill="none" stroke="black"/>
  <path d="M50 280 L50 290 L60 290" fill="none" stroke="black"/>
  
  <!-- Answer -->
  <text x="225" y="360" font-size="12" text-anchor="middle">陰影面積 = 大三角形 - 矩形 = 130 - 48 = 82 cm²</text>
</svg>