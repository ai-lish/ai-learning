<svg width="400" height="350" viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Q39: 六邊形糖果盒 (正六邊形棱柱) -->
  <text x="200" y="25" font-size="14" text-anchor="middle">Q39: 正六邊形糖果盒</text>
  
  <!-- Front hexagon -->
  <polygon points="200,280 120,230 120,130 200,80 280,130 280,230" fill="#e0e0e0" stroke="black" stroke-width="2"/>
  
  <!-- Back hexagon -->
  <polygon points="200,200 120,150 120,50 200,0 280,50 280,150" fill="none" stroke="black" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Connecting edges -->
  <line x1="200" y1="280" x2="200" y2="200" stroke="black" stroke-width="2"/>
  <line x1="120" y1="230" x2="120" y2="150" stroke="black" stroke-width="2"/>
  <line x1="280" y1="230" x2="280" y2="150" stroke="black" stroke-width="2"/>
  
  <!-- Center point -->
  <circle cx="200" cy="230" r="3" fill="black"/>
  <text x="210" y="235" font-size="11">底面積 = 374 cm²</text>
  
  <!-- Side length -->
  <line x1="160" y1="205" x2="160" y2="175" stroke="black" stroke-width="1"/>
  <text x="150" y="195" font-size="11">8cm</text>
  
  <!-- Height -->
  <text x="300" y="180" font-size="12">6cm (高)</text>
  
  <!-- Hexagon labels -->
  <text x="195" y="285" font-size="10" fill="blue">F</text>
  <text x="115" y="235" font-size="10" fill="blue">A</text>
  <text x="105" y="135" font-size="10" fill="blue">B</text>
  <text x="200" y="75" font-size="10" fill="blue">C</text>
  <text x="285" y="135" font-size="10" fill="blue">D</text>
  <text x="285" y="235" font-size="10" fill="blue">E</text>
  
  <!-- Volume calculation -->
  <text x="200" y="330" font-size="12" text-anchor="middle">體積 = 底面積 × 高 = 374 × 6 = 2244 cm³</text>
</svg>