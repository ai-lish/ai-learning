<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 挑戰區 - 少康老師教學網站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang HK", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f23 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 20px;
        }
        
        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        header p {
            opacity: 0.7;
        }
        
        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .game-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #e74c3c;
            background: rgba(255,255,255,0.1);
        }
        
        .game-emoji {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .game-desc {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .game-tag {
            display: inline-block;
            background: #e74c3c;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 15px;
        }
        
        .section-title {
            font-size: 1.3rem;
            margin: 30px 0 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回教學網站</a>
        
        <header>
            <h1>🏆 挑戰區</h1>
            <p>訓練計算機技巧，挑戰最快最準！</p>
        </header>
        
        <h2 class="section-title">🧮 計算機大賽</h2>
        
        <div class="games-grid">
            <div class="game-card" onclick="window.location.href='calculator-game.html'">
                <div class="game-emoji">🧮</div>
                <div class="game-title">計算機大賽</div>
                <div class="game-desc">訓練計算機技巧<br>快問快答挑戰</div>
                <div class="game-tag">中一至中六</div>
            </div>
            
            <div class="game-card" onclick="window.location.href='games/place-value-game.html'">
                <div class="game-emoji">🎯</div>
                <div class="game-title">位值大挑戰</div>
                <div class="game-desc">重溫位值概念<br>取個/十/百/千/萬位</div>
                <div class="game-tag">小學複習</div>
            </div>
        </div>
        
        <h2 class="section-title">📐 數學遊戲</h2>
        
        <div class="games-grid">
            <div class="game-card" onclick="window.location.href='games/S1Ch1-1-PrimeFactor.html'">
                <div class="game-emoji">🔢</div>
                <div class="game-title">質因數分解</div>
                <div class="game-desc">將數字分解成質因數</div>
                <div class="game-tag">中一</div>
            </div>
            
            <div class="game-card" onclick="window.location.href='games/S1Ch1-2-Area.html'">
                <div class="game-emoji">📐</div>
                <div class="game-title">面積計算</div>
                <div class="game-desc">各種圖形面積計算</div>
                <div class="game-tag">中一</div>
            </div>
            
            <div class="game-card" onclick="window.location.href='games/S1Ch2-1-DirectedNumber.html'">
                <div class="game-emoji">➕</div>
                <div class="game-title">正負數運算</div>
                <div class="game-desc">正負數加减乘除</div>
                <div class="game-tag">中一</div>
            </div>
            
            <div class="game-card" onclick="window.location.href='games/S1Ch4-1-AlgebraLanguage.html'">
                <div class="game-emoji">📝</div>
                <div class="game-title">代數語言</div>
                <div class="game-desc">代數表達式練習</div>
                <div class="game-tag">中一</div>
            </div>
        </div>
    </div>
</body>
</html>
