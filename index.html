    <script>
        // CSV Data Source - replace with actual CSV URL
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1VljZfrVqyzYSkJaxcF_U7NMvjjGroigZdQlhYcy6HjE/export?format=csv';
        
        // Web App URL for adding homework
        const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzDKsLWMooL41jiBz-N6Ea9XZYEwDjTNycQTP4gUsCc1HJRVWNWvJeb1CFsCbvPMKR1/exec';
        
        // Homework data storage (populated from CSV)
        let rawHomeworkData = [];
        
        // Fetch and parse CSV data
        async function fetchHomeworkData() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('Failed to fetch CSV');
                const csvText = await response.text();
                rawHomeworkData = parseCSV(csvText);
                initCalendar();
            } catch (error) {
                console.error('Error loading homework data:', error);
                rawHomeworkData = [];
                initCalendar();
            }
        }
        
        // Parse CSV text into structured data
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];
            
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                // Handle CSV with format: date,subject,detail,deadline
                const parts = line.split(',');
                if (parts.length >= 3) {
                    const date = parts[0].trim();
                    const subject = parts[1].trim();
                    const detail = parts[2].trim();
                    const deadline = parts[3] ? parts[3].trim() : '';
                    
                    // Find or create date entry
                    let dateEntry = result.find(d => d.date === date);
                    if (!dateEntry) {
                        dateEntry = { date: date, items: [] };
                        result.push(dateEntry);
                    }
                    dateEntry.items.push({ subject, detail, deadline });
                }
            }
            return result;
        }
        
        function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('open'); document.getElementById('sideMenu').classList.toggle('open'); }
        function closeMenu() { document.getElementById('menuOverlay').classList.remove('open'); document.getElementById('sideMenu').classList.remove('open'); }
        
        function showSection(id, btn) {
            document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-section').classList.add('active');
            closeMenu();
        }
        
        const availableExams = [
            { year: '2025-26', grade: 's1', term: 'term2', name: '2025-26 S1 第二學期', file: 'exam/2025-26-s1-term2/index.html' },
            { year: '2024-25', grade: 's1', term: 'term2', name: '2024-25 S1 第二學期', file: '2024-25-s1-term2/index.html' },
            { year: '2025-26', grade: 's3', term: 'term2', name: '中三 第二學期 2025-26', file: '2025-26-s3-term2/index.html' },
            { year: '2025-26', grade: 's5', term: 'term2', name: '中五 第二學期 2025-26', file: 'exam/S5-2025-26-Term2/2025-26-s5-term2.html' }
        ];
        
        let selectedTerm = '';

        function selectTermFilter(term, btn) {
            selectedTerm = term;
            document.querySelectorAll('.exam-term-filter').forEach(b => { b.classList.remove('active'); b.style.background = '#3498db'; });
            btn.classList.add('active'); btn.style.background = '#27ae60';
            filterExam();
        }
        function filterExam() {
            const year = document.getElementById('examYearSelect').value;
            const grade = document.getElementById('examGradeSelect').value;
            const results = document.getElementById('examResults');
            const filtered = availableExams.filter(exam => (!year || exam.year === year) && (!grade || exam.grade === grade) && (!selectedTerm || exam.term === selectedTerm));
            results.innerHTML = filtered.length ? filtered.map(e => '<a href="'+e.file+'" class="grade-btn" style="background:#27ae60;display:block;text-decoration:none;color:white;padding:10px;border-radius:8px;margin-bottom:5px;">📝 '+e.name+'</a>').join('') : '<p style="color:#999;text-align:center;">暫時未有符合既試卷</p>';
        }
        

        const weekDayNames = ["日","一","二","三","四","五","六"];
        let processedHomework = {};
        
        function formatDateKey(date) { return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0'); }
        
        function processData() {
            processedHomework = {};
            let latestDate = new Date();
            rawHomeworkData.forEach(day => {
                const pd = new Date(day.date+'T00:00:00');
                const pk = formatDateKey(pd);
                if (!processedHomework[pk]) processedHomework[pk] = [];
                day.items.forEach(item => {
                    processedHomework[pk].push(item);
                    // Use deadline field (DD/MM format)
                    const dm = item.deadline ? item.deadline.match(/(\d+)\/(\d+)/) : null;
                    if (dm) {
                        const currentYear = new Date().getFullYear();
                        const dl = new Date(currentYear, parseInt(dm[2])-1, parseInt(dm[1]));
                        // If deadline is before the date's month, assume next year
                        if (dl < pd) dl.setFullYear(currentYear + 1);
                        if (dl > pd) {
                            // Show reminder on day before deadline
                            const rd = new Date(dl); rd.setDate(dl.getDate()-1);
                            const rk = formatDateKey(rd);
                            if (!processedHomework[rk]) processedHomework[rk] = [];
                            processedHomework[rk].push({subject:"🚨 提醒",detail:'明天截止：['+item.subject+'] '+item.detail});
                            if (dl > latestDate) latestDate = dl;
                        }
                    }
                });
            });
            return latestDate;
        }
        
        function initCalendar() {
            const latestNeededDate = processData();
            const today = new Date(); today.setHours(0,0,0,0);
            const currentSunday = new Date(today); currentSunday.setDate(today.getDate() - today.getDay());
            renderWeek('last-week-grid', -7, currentSunday, true);
            renderWeek('this-week-grid', 0, currentSunday, false);
            renderWeek('next-week-grid', 7, currentSunday, false);
            const nextSat = new Date(currentSunday); nextSat.setDate(currentSunday.getDate() + 13);
            document.getElementById('extended-section').style.display = latestNeededDate > nextSat ? 'block' : 'none';
            if (latestNeededDate > nextSat) renderWeek('extended-grid', 14, currentSunday, false);
        }
        
        function renderWeek(containerId, offset, currentSunday, isLastWeek) {
            const c = document.getElementById(containerId); c.innerHTML = '';
            for (let i = 0; i < 7; i++) {
                const d = new Date(currentSunday); d.setDate(currentSunday.getDate() + offset + i);
                const ds = formatDateKey(d);
                const hw = processedHomework[ds] || [];
                const isToday = ds === formatDateKey(new Date());
                const card = document.createElement('div');
                card.className = 'day-card ' + (isToday ? 'today' : '');
                const hc = i === 0 ? 'header-sun' : (i === 6 ? 'header-sat' : 'header-default');
                const bg = isLastWeek ? 'bg-gray' : 'bg-white';
                card.onclick = () => openModal(d.getDate()+'/'+(d.getMonth()+1), weekDayNames[i], hw, formatDateKey(d));
                const sum = hw.length ? hw.slice(0,2).map(h=>'• '+h.subject).join('<br>')+'<br>...' : '<span style="color:#bdc3c7">無功課</span>';
                card.innerHTML = '<div class="day-header '+hc+'"><span>'+weekDayNames[i]+'</span><span>'+d.getDate()+'/'+(d.getMonth()+1)+'</span></div><div class="homework-content '+bg+'">'+sum+'</div>';
                c.appendChild(card);
            }
        }
        
        function openModal(dl, dn, hw, dateKey) {
            // Format homework for display and copy
            const formattedText = hw.map(h=> h.deadline ? h.subject+'：'+h.detail+' ('+h.deadline+')' : h.subject+'：'+h.detail).join('\n');
            document.getElementById('modalHeader').innerHTML = '<h2>'+dl+' (星期'+dn+') 功課表</h2><button onclick="copyHomework(\''+dateKey+'\')" style="background:#3498db;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;margin-top:10px;">📋 複製</button>';
            document.getElementById('modalTableContainer').innerHTML = hw.length ? '<table class="hw-table"><thead><tr><th>科目</th><th>內容</th></tr></thead><tbody>'+hw.map(h=>'<tr><td><strong>'+h.subject+'</strong></td><td>'+h.detail.replace(/\n/g,'<br>')+(h.deadline?' <span style="color:#e74c3c;">⏰ '+h.deadline+'</span>':'')+'</td></tr>').join('')+'</tbody></table><textarea id="copyText_'+dateKey+'" style="display:none;">'+formattedText+'</textarea>' : '<p>今日暫無功課。</p>';
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        function copyHomework(dateKey) {
            const text = document.getElementById('copyText_'+dateKey).value;
            navigator.clipboard.writeText(text).then(() => {
                alert('已複製到剪貼簿！');
            }).catch(err => {
                alert('複製失敗：'+err);
            });
        }
        window.onload = function() { fetchHomeworkData(); filterExam(); };
        
        // Admin: Add Homework
        function openAdminModal() {
            document.getElementById('adminOverlay').style.display = 'flex';
        }
        function closeAdminModal() {
            document.getElementById('adminOverlay').style.display = 'none';
        }
        async function submitHomework() {
            const date = document.getElementById('hwDate').value;
            const detailText = document.getElementById('hwDetail').value.trim();
            
            if (!date) {
                alert('請填寫日期');
                return;
            }
            if (!detailText) {
                alert('請填寫功課內容');
                return;
            }
            
            // Parse each line: "科目：內容 (DD/MM)" or "科目：內容"
            const lines = detailText.split('\n').filter(l => l.trim());
            const items = lines.map(line => {
                const match = line.match(/^(.+?)：(.*?)(\s*\((\d+\/\d+)\))?$/);
                if (match) {
                    return { subject: match[1].trim(), detail: match[2].trim(), deadline: match[4] || '' };
                }
                // Fallback: treat whole line as detail with no subject
                return { subject: '', detail: line.trim(), deadline: '' };
            }).filter(item => item.detail);
            
            if (items.length === 0) {
                alert('請填寫有效格式的功課');
                return;
            }
            
            try {
                for (const item of items) {
                    await fetch(WEBAPP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'add', date, subject: item.subject, detail: item.detail, deadline: item.deadline })
                    });
                }
                alert('功課已添加！請刷新頁面查看。');
                closeAdminModal();
                document.getElementById('hwDate').value = '';
                document.getElementById('hwDetail').value = '';
            } catch (error) {
                alert('錯誤：' + error.message);
            }
        }
    </script>
</body>
