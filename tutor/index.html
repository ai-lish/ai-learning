<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學自學系統 - 由零到精通</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang HK", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        header {
            text-align: center;
            padding: 40px 20px;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        .grade-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .grade-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .grade-card:hover {
            transform: translateY(-10px);
            border-color: #ffd700;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .grade-card.s1 { background: linear-gradient(135deg, rgba(255,107,107,0.2), rgba(255,107,107,0.05)); }
        .grade-card.s3 { background: linear-gradient(135deg, rgba(78,205,196,0.2), rgba(78,205,196,0.05)); }
        
        .grade-icon { font-size: 4rem; margin-bottom: 15px; }
        .grade-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; }
        .grade-desc { opacity: 0.8; margin-bottom: 15px; }
        .chapter-count {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .features {
            margin-top: 50px;
            text-align: center;
        }
        .features h2 { margin-bottom: 30px; color: #ffd700; }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .feature-item {
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        .feature-icon { font-size: 2rem; margin-bottom: 10px; }
        .feature-title { font-weight: bold; margin-bottom: 5px; }
        .feature-desc { font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 數學自學系統</h1>
            <p>由零到精通 - 一步一步學識數學</p>
        </header>
        
        <div class="grade-selection">
            <a href="s1/index.html" class="grade-card s1">
                <div class="grade-icon">📕</div>
                <div class="grade-title">中一數學 (S1)</div>
                <div class="grade-desc">10個課題 · 基礎數學</div>
                <span class="chapter-count">10 課題</span>
            </a>
            
            <a href="s3/index.html" class="grade-card s3">
                <div class="grade-icon">📗</div>
                <div class="grade-title">中三數學 (S3)</div>
                <div class="grade-desc">7個課題 · 進階數學</div>
                <span class="chapter-count">7 課題</span>
            </a>
        </div>
        
        <div class="features">
            <h2>🚀 學習特色</h2>
            <div class="feature-grid">
                <div class="feature-item">
                    <div class="feature-icon">📖</div>
                    <div class="feature-title">詳細教學</div>
                    <div class="feature-desc">圖文並茂解說</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">✏️</div>
                    <div class="feature-title">互動練習</div>
                    <div class="feature-desc">即時Feedback</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎮</div>
                    <div class="feature-title">趣味遊戲</div>
                    <div class="feature-desc">玩住學數學</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📝</div>
                    <div class="feature-title">測驗評核</div>
                    <div class="feature-desc">檢視學習成果</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
