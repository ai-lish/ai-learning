<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學遊戲 - Zach's Math Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            transition: 0.3s;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        .category {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .category h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .game-btn {
            display: block;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
            border: none;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .game-btn .icon {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回主頁</a>
        <h1>🎮 數學遊戲專區</h1>
        
        <div class="category">
            <h2>📐 中一幾何</h2>
            <div class="games-grid">
                <a href="簡易圖形面積和周界.html" class="game-btn">
                    <span class="icon">📐</span>
                    簡易圖形面積周界
                </a>
                <a href="複合圖形的面積和周界.html" class="game-btn">
                    <span class="icon">🔺</span>
                    複合圖形面積
                </a>
                <a href="重溫面積公式.html" class="game-btn">
                    <span class="icon">📏</span>
                    重溫面積公式
                </a>
                <a href="1d_求面積和周界_限時版.html" class="game-btn">
                    <span class="icon">⏱️</span>
                    求面積周界限時版
                </a>
            </div>
        </div>

        <div class="category">
            <h2>📊 中一/中二 代數</h2>
            <div class="games-grid">
                <a href="有向數.html" class="game-btn">
                    <span class="icon">➕</span>
                    有向數練習
                </a>
                <a href="指數化簡練習.html" class="game-btn">
                    <span class="icon">🔢</span>
                    指數化簡
                </a>
                <a href="主項轉換練習.html" class="game-btn">
                    <span class="icon">📝</span>
                    主項轉換
                </a>
                <a href="第二學期基礎短答題.html" class="game-btn">
                    <span class="icon">📋</span>
                    基礎短答題
                </a>
            </div>
        </div>

        <div class="category">
            <h2>🔢 多項式遊戲</h2>
            <div class="games-grid">
                <a href="1多項式的數學語言.html" class="game-btn">
                    <span class="icon">1️⃣</span>
                    多項式基礎
                </a>
                <a href="2多項式的加減法運算.html" class="game-btn">
                    <span class="icon">2️⃣</span>
                    多項式加减
                </a>
                <a href="3單項式的乘除法運算.html" class="game-btn">
                    <span class="icon">3️⃣</span>
                    單項式乘除
                </a>
                <a href="4多項式的加減乘法.html" class="game-btn">
                    <span class="icon">4️⃣</span>
                    多項式綜合
                </a>
            </div>
        </div>

        <div class="category">
            <h2>📍 坐標幾何</h2>
            <div class="games-grid">
                <a href="直角坐標大冒險.html" class="game-btn">
                    <span class="icon">🗺️</span>
                    直角坐標大冒險
                </a>
                <a href="坐標幾何練習.html" class="game-btn">
                    <span class="icon">📍</span>
                    坐標幾何練習
                </a>
            </div>
        </div>

        <div class="category">
            <h2>🔷 立體幾何</h2>
            <div class="games-grid">
                <a href="2a_柱體體積及總表面面積.html" class="game-btn">
                    <span class="icon">📦</span>
                    柱體面積/體積
                </a>
                <a href="2b_柱體體積及總表面面積.html" class="game-btn">
                    <span class="icon">🎲</span>
                    柱體進階
                </a>
                <a href="2_圓錐體_平截頭體練習.html" class="game-btn">
                    <span class="icon">🔺</span>
                    圓錐/平截頭體
                </a>
            </div>
        </div>
    </div>
</body>
</html>
