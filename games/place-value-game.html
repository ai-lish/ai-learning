<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位值大挑戰 - AI Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #3498DB 0%, #8E44AD 100%); min-height: 100vh; color: #2C3E50; padding: 15px; }
        .container { max-width: 550px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { background: linear-gradient(135deg, #3498DB 0%, #8E44AD 100%); color: white; padding: 15px; text-align: center; }
        .header h1 { font-size: 1.4rem; margin-bottom: 5px; }
        .header a { color: white; text-decoration: none; font-size: 0.85rem; }
        .game-tabs { display: flex; background: #f5f5f5; border-bottom: 2px solid #ddd; }
        .game-tab { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; font-weight: 600; color: #666; transition: all 0.3s; border: none; background: none; font-size: 0.8rem; }
        .game-tab:hover { background: #e0e0e0; }
        .game-tab.active { background: white; color: #8E44Ad; border-bottom: 3px solid #8E44Ad; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        .score-board { display: flex; justify-content: space-around; background: #f5f5f5; padding: 10px; border-radius: 8px; margin-bottom: 12px; }
        .score-item { text-align: center; }
        .score-num { font-size: 1.2rem; font-weight: bold; }
        .score-label { font-size: 0.7rem; color: #666; }
        .score-correct .score-num { color: #27ae60; }
        .score-wrong .score-num { color: #e74c3c; }
        .question-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 12px; }
        .question-type { font-size: 1.1rem; font-weight: bold; color: #8E44Ad; margin-bottom: 12px; text-align: center; }
        .number-container { text-align: center; margin: 12px 0; }
        .number-display { font-size: 1.8rem; font-weight: bold; letter-spacing: 4px; display: inline-flex; align-items: center; background: white; padding: 12px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .digit { display: inline-block; cursor: pointer; padding: 4px 2px; border-radius: 4px; transition: all 0.15s; border: 2px solid transparent; min-width: 24px; text-align: center; }
        .digit:hover { border-color: #bbb; }
        .digit.selected { border-color: #8E44Ad; background: #8E44Ad; color: white; }
        .digit.correct { border-color: #27ae60; background: rgba(39,174,96,0.1); }
        .digit.wrong { border-color: #e74c3c; background: rgba(231,76,60,0.1); }
        .decimal-point { font-weight: bold; color: #333; }
        .input-area { text-align: center; margin: 15px 0; }
        .input-display { font-size: 2rem; font-weight: bold; background: white; padding: 15px 30px; border-radius: 8px; border: 3px solid #ddd; min-width: 150px; display: inline-block; letter-spacing: 4px; }
        .input-display:focus { border-color: #8E44Ad; outline: none; }
        .input-hint { font-size: 0.85rem; color: #666; margin-top: 8px; }
        .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
        .btn { padding: 10px 25px; font-size: 0.95rem; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-confirm { background: #8E44Ad; color: white; }
        .btn-confirm:hover { background: #7D3C98; }
        .btn-confirm:disabled { background: #ccc; cursor: not-allowed; }
        .btn-next { background: #3498DB; color: white; }
        .result-row { display: flex; align-items: center; justify-content: center; margin-top: 12px; min-height: 30px; }
        .result-icon { font-size: 1.3rem; margin-left: 8px; }
        .history-section { padding: 12px; border-top: 2px solid #eee; display: none; }
        .history-section.show { display: block; }
        .history-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; }
        .progress-bar { height: 5px; background: #eee; border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3498DB, #8E44Ad); transition: width 0.3s; }
        .start-screen { padding: 25px; text-align: center; }
        .start-btn { background: #8E44Ad; color: white; border: none; padding: 12px 35px; font-size: 1rem; border-radius: 25px; cursor: pointer; margin: 12px 0; }
        .instructions { background: #f8f9fa; padding: 12px; border-radius: 8px; text-align: left; font-size: 0.85rem; }
        .instructions h3 { color: #8E44Ad; margin-bottom: 6px; }
        .instructions li { margin: 4px 0; line-height: 1.3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 位值大挑戰</h1>
            <a href="S5Ch17.html">← 返回教學網站</a>
        </div>
        <div class="game-tabs">
            <button class="game-tab active" onclick="switchGameTab('click')">👆 點擊</button>
            <button class="game-tab" onclick="switchGameTab('floor')">⬇️ 下捨入</button>
            <button class="game-tab" onclick="switchGameTab('ceil')">⬆️ 上捨入</button>
            <button class="game-tab" onclick="switchGameTab('round')">🔄 四捨五入</button>
        </div>
        <div id="startScreen" class="start-screen">
            <div class="instructions">
                <h3>📖 遊戲說明</h3>
                <ul>
                    <li><strong>👆 點擊：</strong>點擊正確既位值數字</li>
                    <li><strong>⬇️ 下捨入：</strong>輸入向下捨入既數值</li>
                    <li><strong>⬆️ 上捨入：</strong>輸入向上捨入既數值</li>
                    <li><strong>🔄 四捨五入：</strong>輸入四捨五入既數值</li>
                </ul>
            </div>
<button id="startGameBtn" class="start-btn">🎮 開始遊戲</button>
        </div>
        <div id="gameScreen" style="display:none;">
            <div id="tab-click" class="tab-content active">
                <div class="progress-bar"><div id="pf1" class="progress-fill" style="width:0%"></div></div>
                <div class="score-board">
                    <div class="score-item score-correct"><div class="score-num" id="c1">0</div><div class="score-label">正確</div></div>
                    <div class="score-item score-wrong"><div class="score-num" id="w1">0</div><div class="score-label">錯誤</div></div>
                    <div class="score-item"><div class="score-num" id="t1">0</div><div class="score-label">總題</div></div>
                </div>
                <div class="question-box">
                    <div class="question-type" id="qt1"></div>
                    <div class="number-container"><div class="number-display" id="nd1"></div></div>
                    <p style="color:#666;font-size:0.8rem;text-align:center;">點擊正確既位值數字</p>
                    <div class="result-row"><span id="rt1"></span><span id="ri1" class="result-icon"></span></div>
                    <div class="btn-row">
                        <button class="btn btn-confirm" id="cf1" onclick="confirm1()" disabled>✓ 核對</button>
                        <button class="btn btn-next" id="nx1" onclick="next1()" style="display:none;">下一題 →</button>
                    </div>
                </div>
            </div>
            <div id="tab-floor" class="tab-content">
                <div class="progress-bar"><div id="pf2" class="progress-fill" style="width:0%"></div></div>
                <div class="score-board">
                    <div class="score-item score-correct"><div class="score-num" id="c2">0</div><div class="score-label">正確</div></div>
                    <div class="score-item score-wrong"><div class="score-num" id="w2">0</div><div class="score-label">錯誤</div></div>
                    <div class="score-item"><div class="score-num" id="t2">0</div><div class="score-label">總題</div></div>
                </div>
                <div class="question-box">
                    <div class="question-type" id="qt2">求下捨入至 ___</div>
                    <div class="input-area">
                        <div class="number-display" id="nd2"></div>
                        <div class="input-hint">請輸入向下捨入既結果</div>
                        <input type="text" id="in2" class="input-display" placeholder="?" oninput="checkIn(2)">
                    </div>
                    <div class="result-row"><span id="rt2"></span><span id="ri2" class="result-icon"></span></div>
                    <div class="btn-row">
                        <button class="btn btn-confirm" id="cf2" onclick="confirm2()" disabled>✓ 核對</button>
                        <button class="btn btn-next" id="nx2" onclick="next2()" style="display:none;">下一題 →</button>
                    </div>
                </div>
            </div>
            <div id="tab-ceil" class="tab-content">
                <div class="progress-bar"><div id="pf3" class="progress-fill" style="width:0%"></div></div>
                <div class="score-board">
                    <div class="score-item score-correct"><div class="score-num" id="c3">0</div><div class="score-label">正確</div></div>
                    <div class="score-item score-wrong"><div class="score-num" id="w3">0</div><div class="score-label">錯誤</div></div>
                    <div class="score-item"><div class="score-num" id="t3">0</div><div class="score-label">總題</div></div>
                </div>
                <div class="question-box">
                    <div class="question-type" id="qt3">求上捨入至 ___</div>
                    <div class="input-area">
                        <div class="number-display" id="nd3"></div>
                        <div class="input-hint">請輸入向上捨入既結果</div>
                        <input type="text" id="in3" class="input-display" placeholder="?" oninput="checkIn(3)">
                    </div>
                    <div class="result-row"><span id="rt3"></span><span id="ri3" class="result-icon"></span></div>
                    <div class="btn-row">
                        <button class="btn btn-confirm" id="cf3" onclick="confirm3()" disabled>✓ 核對</button>
                        <button class="btn btn-next" id="nx3" onclick="next3()" style="display:none;">下一題 →</button>
                    </div>
                </div>
            </div>
            <div id="tab-round" class="tab-content">
                <div class="progress-bar"><div id="pf4" class="progress-fill" style="width:0%"></div></div>
                <div class="score-board">
                    <div class="score-item score-correct"><div class="score-num" id="c4">0</div><div class="score-label">正確</div></div>
                    <div class="score-item score-wrong"><div class="score-num" id="w4">0</div><div class="score-label">錯誤</div></div>
                    <div class="score-item"><div class="score-num" id="t4">0</div><div class="score-label">總題</div></div>
                </div>
                <div class="question-box">
                    <div class="question-type" id="qt4">求四捨五入至 ___</div>
                    <div class="input-area">
                        <div class="number-display" id="nd4"></div>
                        <div class="input-hint">請輸入四捨五入既結果</div>
                        <input type="text" id="in4" class="input-display" placeholder="?" oninput="checkIn(4)">
                    </div>
                    <div class="result-row"><span id="rt4"></span><span id="ri4" class="result-icon"></span></div>
                    <div class="btn-row">
                        <button class="btn btn-confirm" id="cf4" onclick="confirm4()" disabled>✓ 核對</button>
                        <button class="btn btn-next" id="nx4" onclick="next4()" style="display:none;">下一題 →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        console.log("Script loaded!");

        document.addEventListener("DOMContentLoaded", function() {
            document.querySelector(".start-btn").addEventListener("click", function() { alert("Click detected!"); startGame(); });
        });

        window.onerror = function(msg, url, line) { alert("Error: " + msg + " Line: " + line); };

        const clickTypes = [
            {t:'個位',d:'取接近個位',n:()=>rnd(1000,99999)},
            {t:'十位',d:'取接近十位',n:()=>rnd(100,9999)},
            {t:'百位',d:'取接近百位',n:()=>rnd(1000,99999)},
            {t:'千位',d:'取接近千位',n:()=>rnd(10000,999999)},
            {t:'萬位',d:'取接近萬位',n:()=>rnd(100000,9999999)}
        ];
        const rndTypes = [
            {to:'個位',d:'個位',n:()=>genRnd(1)},
            {to:'十位',d:'十位',n:()=>genRnd(10)},
            {to:'百位',d:'百位',n:()=>genRnd(100)},
            {to:'千位',d:'千位',n:()=>genRnd(1000)},
            {to:'小數',d:'0.1',n:()=>genDec(1)},
            {to:'小數',d:'0.01',n:()=>genDec(2)}
        ];
        let gs = {cur:'click',click:{c:0,w:0,t:0,q:null,sel:null},floor:{c:0,w:0,t:0,q:null},ceil:{c:0,w:0,t:0,q:null},round:{c:0,w:0,t:0,q:null}};
        function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
        function genRnd(p){return rnd(10,999)*p+rnd(1,9);}
        function genDec(p){let x=rnd(10,99),f=Math.pow(10,p);return (x+rnd(1,9*f)/f).toFixed(p)/1;}
        function getParts(n){if(Number.isInteger(n))return{parts:n.toString().split('').map(v=>({v:parseInt(v),d:false})),has:false};let s=n.toFixed(3),ip=Math.floor(n),r={parts:[],has:true};ip.toString().split('').forEach(v=>r.parts.push({v:parseInt(v),d:false}));r.parts.push({v:'.',d:'p'});s.split('.')[1].split('').forEach(v=>r.parts.push({v:parseInt(v),d:true}));return r;}
        function getTarget(n,t){let ip=Math.floor(n),l=ip.toString().length;switch(t){case'個位':return{v:ip%10,i:l-1};case'十位':return{v:Math.floor(ip/10)%10,i:l-2};case'百位':return{v:Math.floor(ip/100)%10,i:l-3};case'千位':return{v:Math.floor(ip/1000)%10,i:l-4};case'萬位':return{v:Math.floor(ip/10000)%10,i:l-5};default:{return{v:0,i:0}}}
        function switchGameTab(t){gs.cur=t;document.querySelectorAll('.game-tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));event.target.classList.add('active');document.getElementById('tab-'+t).classList.add('active');if(document.getElementById('gameScreen').style.display!=='none')genQ(t);}
        function startGame(){['click','floor','ceil','round'].forEach(t=>{gs[t]={c:0,w:0,t:0,q:null};[1,2,3,4].forEach(i=>{document.getElementById('c'+i).innerText='0';document.getElementById('w'+i).innerText='0';document.getElementById('t'+i).innerText='0'})});document.getElementById('startScreen').style.display='none';document.getElementById('gameScreen').style.display='block';genQ(gs.cur)}
        function genQ(t){let q,a;if(t==='click'){let x=clickTypes[Math.floor(Math.random()*clickTypes.length)];q={ty:x.t,ds:x.d,num:x.n()};let g=getTarget(q.num,q.ty);q.ans=g.v;q.idx=g.i;gs.click.q=q;dispClick(q)}else{let x=rndTypes[Math.floor(Math.random()*rndTypes.length)];q={ty:x.to,ds:x.d,num:x.n()};let p=parseInt(x.d)||0.1;if(t==='floor')q.ans=Math.floor(q.num/p)*p;else if(t==='ceil')q.ans=Math.ceil(q.num/p)*p;else q.ans=Math.round(q.num/p)*p;gs[t].q=q;dispInp(t,q)}}
        function dispClick(q){document.getElementById('qt1').innerText=q.ds;let p=getParts(q.num),c=document.getElementById('nd1');c.innerHTML='';p.parts.forEach((x,i)=>{if(x.d==='p'){let s=document.createElement('span');s.className='decimal-point';s.innerText='.';c.appendChild(s)}else{let s=document.createElement('span');s.className='digit';s.innerText=x.v;s.dataset.idx=i;s.onclick=()=>selDgt(s,i,q);c.appendChild(s)}});document.getElementById('cf1').disabled=true;document.getElementById('cf1').style.display='inline-block';document.getElementById('nx1').style.display='none';document.getElementById('rt1').innerText='';document.getElementById('ri1').innerText=''}
        function selDgt(el,i,q){document.querySelectorAll('#nd1 .digit').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');gs.click.sel=i;document.getElementById('cf1').disabled=false}
        function confirm1(){let q=gs.click.q,el=document.querySelector('#nd1 .digit.selected');if(!el)return;let si=parseInt(el.dataset.idx),ok=si===q.idx;gs.click.t++;if(ok)gs.click.c++;else gs.click.w++;document.getElementById('c1').innerText=gs.click.c;document.getElementById('w1').innerText=gs.click.w;document.getElementById('t1').innerText=gs.click.t;document.querySelectorAll('#nd1 .digit').forEach(x=>{x.style.cursor='default';if(parseInt(x.dataset.idx)===q.idx)x.classList.add('correct');else if(x===el&&!ok)x.classList.add('wrong')});document.getElementById('rt1').innerText=ok?'正確！':'答案: '+q.ans;document.getElementById('ri1').innerText=ok?'✓':'✗';document.getElementById('ri1').style.color=ok?'#27ae60':'#e74c3c';document.getElementById('cf1').style.display='none';document.getElementById('nx1').style.display='inline-block'}
        function next1(){genQ('click')}
        function dispInp(t,q){let i=t==='floor'?2:t==='ceil'?3:4;document.getElementById('qt'+i).innerText='求'+(t==='floor'?'下':t==='ceil'?'上':'四捨五入')+'捨入至 '+q.ds;let p=getParts(q.num),c=document.getElementById('nd'+i);c.innerHTML='';p.parts.forEach(x=>{if(x.d==='p'){let s=document.createElement('span');s.className='decimal-point';s.innerText='.';c.appendChild(s)}else{let s=document.createElement('span');s.className='digit';s.innerText=x.v;c.appendChild(s)}});document.getElementById('in'+i).value='';document.getElementById('in'+i).disabled=false;document.getElementById('in'+i).focus();document.getElementById('cf'+i).disabled=true;document.getElementById('cf'+i).style.display='inline-block';document.getElementById('nx'+i).style.display='none';document.getElementById('rt'+i).innerText='';document.getElementById('ri'+i).innerText=''}
        function checkIn(i){document.getElementById('cf'+i).disabled=!document.getElementById('in'+i).value}
        function confirm2(){procIn('floor')}
        function confirm3(){procIn('ceil')}
        function confirm4(){procIn('round')}
        function procIn(t){let i=t==='floor'?2:t==='ceil'?3:4,q=gs[t].q,ua=parseFloat(document.getElementById('in'+i).value),ok=ua===q.ans;gs[t].t++;if(ok)gs[t].c++;else gs[t].w++;document.getElementById('c'+i).innerText=gs[t].c;document.getElementById('w'+i).innerText=gs[t].w;document.getElementById('t'+i).innerText=gs[t].t;document.getElementById('in'+i).disabled=true;document.getElementById('rt'+i).innerText=ok?'正確！':'答案: '+q.ans;document.getElementById('ri'+i).innerText=ok?'✓':'✗';document.getElementById('ri'+i).style.color=ok?'#27ae60':'#e74c3c';document.getElementById('cf'+i).style.display='none';document.getElementById('nx'+i).style.display='inline-block'}
        function next2(){genQ('floor')}
        function next3(){genQ('ceil')}
        function next4(){genQ('round')}
        
        // 確保Button可以Click - 等DOM load完成先attach event
        window.addEventListener('DOMContentLoaded', function() {
            var btn = document.getElementById('startGameBtn');
            if(btn) {
                btn.addEventListener('click', function() {
                    console.log('開始遊戲ButtonClicked');
                    if(typeof startGame === 'function') {
                        startGame();
                    } else {
                        console.error('startGame function not found!');
                    }
                });
            }
        });
    </script>
</body>
</html>
