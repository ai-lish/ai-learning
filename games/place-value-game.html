<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位值大挑戰 - AI Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #3498DB 0%, #8E44AD 100%); min-height: 100vh; color: #2C3E50; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { background: linear-gradient(135deg, #3498DB 0%, #8E44AD 100%); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .header a { color: white; text-decoration: none; font-size: 0.9rem; }
        
        /* Game Area */
        .game-area { padding: 20px; text-align: center; }
        
        /* Score */
        .score-board { display: flex; justify-content: space-around; background: #f5f5f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .score-item { text-align: center; }
        .score-num { font-size: 1.5rem; font-weight: bold; }
        .score-label { font-size: 0.8rem; color: #666; }
        .score-correct .score-num { color: #27ae60; }
        .score-wrong .score-num { color: #e74c3c; }
        
        /* Question */
        .question-box { background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .question-type { font-size: 1.3rem; font-weight: bold; color: #8E44Ad; margin-bottom: 10px; text-align: center; }
        .question-hint { color: #666; font-size: 0.9rem; text-align: center; margin-bottom: 15px; }
        
        /* Number digits - clickable */
        .number-digits { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin: 30px 0; }
        .digit-box { 
            width: 60px; height: 70px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold;
            border: 4px solid #3498DB; 
            border-radius: 12px; 
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #3498DB;
        }
        .digit-box:hover { transform: translateY(-3px); box-shadow: 0 7px 0 #3498DB; }
        .digit-box.selected { 
            border-color: #8E44Ad; 
            background: #8E44Ad; 
            color: white; 
            box-shadow: 0 4px 0 #6c3483;
            transform: translateY(-3px);
        }
        .digit-box.correct { border-color: #27ae60; background: #27ae60; color: white; box-shadow: 0 4px 0 #1e8449; }
        .digit-box.wrong { border-color: #e74c3c; background: #e74c3c; color: white; box-shadow: 0 4px 0 #c0392b; }
        
        /* Result */
        .result-box { padding: 15px; border-radius: 10px; margin: 15px 0; display: none; }
        .result-box.correct { background: #d4edda; border: 2px solid #27ae60; }
        .result-box.wrong { background: #f8d7da; border: 2px solid #e74c3c; }
        .result-text { font-size: 1.2rem; font-weight: bold; }
        .result-box.correct .result-text { color: #27ae60; }
        .result-box.wrong .result-text { color: #e74c3c; }
        
        /* Next Button */
        .next-btn { background: #8E44Ad; color: white; border: none; padding: 12px 30px; font-size: 1rem; border-radius: 25px; cursor: pointer; margin-top: 15px; }
        .next-btn:hover { background: #7D3C98; }
        
        /* History */
        .history-section { padding: 20px; border-top: 2px solid #eee; display: none; }
        .history-section.show { display: block; }
        .history-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .history-toggle { background: none; border: none; color: #8E44Ad; cursor: pointer; font-size: 0.9rem; }
        
        .history-list { max-height: 300px; overflow-y: auto; }
        .history-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 10px; }
        .history-item.fold { display: none; }
        .history-item .q-num { font-size: 0.8rem; color: #999; width: 30px; }
        .history-item .q-text { flex: 1; font-size: 0.9rem; }
        .history-item .q-result { width: 40px; text-align: center; }
        .history-item .result-icon { font-size: 1.2rem; }
        .history-item .retry-btn { background: #3498DB; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; }
        .history-item .retry-btn.done { background: #27ae60; }
        
        /* Continue Button */
        .continue-btn { background: #27ae60; color: white; border: none; padding: 15px 40px; font-size: 1rem; border-radius: 25px; cursor: pointer; margin: 15px 0; display: none; }
        .continue-btn:hover { background: #219a52; }
        
        /* Fold indicator */
        .fold-indicator { background: #f5f5f5; padding: 8px; text-align: center; font-size: 0.85rem; color: #666; cursor: pointer; border-radius: 5px; margin-bottom: 5px; }
        .fold-indicator:hover { background: #e0e0e0; }
        
        /* Progress */
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3498DB, #8E44Ad); transition: width 0.3s; }
        
        /* Start Screen */
        .start-screen { padding: 40px; text-align: center; }
        .start-btn { background: #8E44Ad; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; margin: 20px 0; }
        .start-btn:hover { background: #7D3C98; transform: scale(1.05); }
        
        .instructions { background: #f8f9fa; padding: 20px; border-radius: 10px; text-align: left; margin: 20px 0; }
        .instructions h3 { color: #8E44Ad; margin-bottom: 10px; }
        .instructions li { margin: 8px 0; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 位值大挑戰</h1>
            <a href="S5Ch17.html">← 返回教學網站</a>
        </div>
        
        <!-- 開始畫面 -->
        <div id="startScreen" class="start-screen">
            <div class="instructions">
                <h3>📖 遊戲說明</h3>
                <ol>
                    <li>系統會隨機顯示題目，例如「取接近個位」</li>
                    <li>題目下方會顯示一個數字</li>
                    <li>點擊該位值既數字</li>
                    <li>每 10 題會顯示歷史記錄</li>
                    <li>可以重做錯咗既題目</li>
                </ol>
            </div>
            <button class="start-btn" onclick="startGame()">🎮 開始遊戲</button>
        </div>
        
        <!-- 遊戲畫面 -->
        <div id="gameScreen" style="display:none;">
            <div class="game-area">
                <!-- 進度 -->
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width:0%"></div>
                </div>
                
                <!-- 分數 -->
                <div class="score-board">
                    <div class="score-item score-correct">
                        <div class="score-num" id="correctCount">0</div>
                        <div class="score-label">正確</div>
                    </div>
                    <div class="score-item score-wrong">
                        <div class="score-num" id="wrongCount">0</div>
                        <div class="score-label">錯誤</div>
                    </div>
                    <div class="score-item">
                        <div class="score-num" id="totalCount">0</div>
                        <div class="score-label">總題數</div>
                    </div>
                </div>
                
                <!-- 題目 -->
                <div class="question-box">
                    <div class="question-type" id="questionType">取接近個位</div>
                    <p style="color:#666;font-size:0.9rem;">請點擊正確既位值數字：</p>
                    
                    <!-- 數字方格 - 點擊選擇 -->
                    <div class="number-digits" id="digitButtons"></div>
                </div>
                
                <!-- 結果 -->
                <div class="result-box" id="resultBox">
                    <div class="result-text" id="resultText"></div>
                </div>
                
                <button class="continue-btn" id="continueBtn" onclick="continueGame()">繼續遊戲 →</button>
                
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一題 →</button>
            </div>
            
            <!-- 歷史記錄 -->
            <div class="history-section" id="historySection">
                <div class="history-title">
                    <span>📋 歷史記錄 (<span id="historyCount">0</span>題)</span>
                    <button class="history-toggle" onclick="toggleHistory()">摺疊/展開</button>
                </div>
                <div class="fold-indicator" id="foldIndicator" onclick="toggleFold()" style="display:none;">
                    顯示更多...
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 遊戲狀態
        let gameState = {
            questions: [],
            currentIndex: 0,
            correct: 0,
            wrong: 0,
            total: 0,
            history: [],
            isFolded: false,
            foldCount: 10
        };
        
        // 題目類型
        const questionTypes = [
            { type: '個位', desc: '取接近個位', number: () => randomNumber(1000, 99999) },
            { type: '十位', desc: '取接近十位', number: () => randomNumber(100, 9999) },
            { type: '百位', desc: '取接近百位', number: () => randomNumber(1000, 99999) },
            { type: '千位', desc: '取接近千位', number: () => randomNumber(10000, 999999) },
            { type: '萬位', desc: '取接近萬位', number: () => randomNumber(100000, 9999999) },
            { type: '整數', desc: '取整數部分', number: () => randomNumber(100, 999) + Math.random() },
            { type: '個位(元)', desc: '取整數/個位(元)', number: () => randomNumber(100, 999) + 0.5 },
            { type: '小數後一位', desc: '取小數後一位', number: () => randomNumber(10, 99) + randomDigit()/10 },
            { type: '小數後兩位', desc: '取小數後兩位', number: () => randomNumber(10, 99) + randomDigit()/10 + randomDigit()/100 },
            { type: '小數後三位', desc: '取小數後三位', number: () => randomNumber(10, 99) + randomDigit()/10 + randomDigit()/100 + randomDigit()/1000 }
        ];
        
        function randomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        function randomDigit() {
            return Math.floor(Math.random() * 10);
        }
        
        function formatNumber(num) {
            if (Number.isInteger(num)) {
                return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            } else {
                return num.toFixed(3);
            }
        }
        
        function getDigits(num) {
            if (Number.isInteger(num)) {
                return num.toString().split('').map(Number);
            } else {
                const str = num.toFixed(3);
                return str.replace('.', '').split('').map(Number);
            }
        }
        
        function getTargetDigit(num, type) {
            const digits = getDigits(num);
            const intPart = Math.floor(num);
            const intDigits = intPart.toString().split('').map(Number).reverse();
            
            switch(type) {
                case '個位': return intDigits[0] || 0;
                case '十位': return intDigits[1] || 0;
                case '百位': return intDigits[2] || 0;
                case '千位': return intDigits[3] || 0;
                case '萬位': return intDigits[4] || 0;
                case '整數': return intPart;
                case '個位(元)': return intDigits[0] || 0;
                case '小數後一位': return Math.floor((num * 10) % 10);
                case '小數後兩位': return Math.floor((num * 100) % 10);
                case '小數後三位': return Math.floor((num * 1000) % 10);
                default: return 0;
            }
        }
        
        function getDigitLabels(num, type) {
            if (Number.isInteger(num)) {
                const digits = num.toString().split('').reverse();
                return digits.map((d, i) => {
                    const labels = ['', '十位', '百位', '千位', '萬位'];
                    return labels[i] || (Math.pow(10, i) === 1 ? '個位' : Math.pow(10, i) + '位');
                }).reverse();
            } else {
                const intPart = Math.floor(num);
                const dec1 = Math.floor((num * 10) % 10);
                const dec2 = Math.floor((num * 100) % 10);
                const dec3 = Math.floor((num * 1000) % 10);
                const intDigits = intPart.toString().padStart(3, '0').split('').reverse();
                return [dec3, dec2, dec1, ...intDigits].reverse().map((d, i, arr) => {
                    const pos = arr.length - 1 - i;
                    if (pos === 0) return '小數後三位';
                    if (pos === 1) return '小數後兩位';
                    if (pos === 2) return '小數後一位';
                    return (pos - 2) === 0 ? '個位' : (pos - 2) + '位';
                }).filter((_, i) => i >= arr.length - 5);
            }
        }
        
        function startGame() {
            gameState = {
                questions: [],
                currentIndex: 0,
                correct: 0,
                wrong: 0,
                total: 0,
                history: [],
                isFolded: false,
                foldCount: 10
            };
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            generateQuestion();
        }
        
        function generateQuestion() {
            const qType = questionTypes[Math.floor(Math.random() * questionTypes.length)];
            const num = qType.number();
            const targetDigit = getTargetDigit(num, qType.type);
            
            const question = {
                type: qType.type,
                desc: qType.desc,
                number: num,
                target: targetDigit
            };
            
            gameState.questions.push(question);
            gameState.currentIndex = gameState.questions.length - 1;
            
            displayQuestion(question);
            updateProgress();
        }
        
        function displayQuestion(q) {
            document.getElementById('questionType').textContent = q.desc;
            
            // 隱藏結果和按鈕
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('continueBtn').style.display = 'none';
            document.getElementById('historySection').classList.remove('show');
            
            // 創建可點擊的數字方格
            const container = document.getElementById('digitButtons');
            container.innerHTML = '';
            container.className = 'number-digits';
            
            const digits = getDigits(q.number);
            
            // 為每個數字創建方格
            digits.forEach((d, i) => {
                const box = document.createElement('div');
                box.className = 'digit-box';
                box.textContent = d;
                box.dataset.value = d;
                box.dataset.index = i;
                box.onclick = () => selectDigit(box, d, q);
                container.appendChild(box);
            });
            
            // 顯示完整數字（用於參考）
            document.getElementById('numberDisplay').textContent = formatNumber(q.number);
        }
        
        let selectedValue = null;
        
        function selectDigit(box, value, q) {
            // 如果已經有答案，不要讓選擇
            if (document.getElementById('resultBox').style.display === 'block') return;
            
            // 清除之前的选择
            document.querySelectorAll('.digit-box').forEach(b => b.classList.remove('selected'));
            
            // 選中新既
            box.classList.add('selected');
            selectedValue = value;
            
            // 自動核對
            checkAnswer(value, q);
        }
        
        function checkAnswer(selected, q) {
            const isCorrect = selected === q.target;
            gameState.total++;
            
            // 禁用所有方格
            document.querySelectorAll('.digit-box').forEach(box => {
                box.style.cursor = 'default';
                if (parseInt(box.dataset.value) === q.target) {
                    box.classList.add('correct');
                } else if (parseInt(box.dataset.value) === selected && !isCorrect) {
                    box.classList.add('wrong');
                }
            });
            
            // 顯示結果
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');
            
            if (isCorrect) {
                gameState.correct++;
                resultBox.className = 'result-box correct';
                resultText.textContent = '✅ 正確！' + q.target;
            } else {
                gameState.wrong++;
                resultBox.className = 'result-box wrong';
                resultText.textContent = '❌ 錯誤！正確答案係 ' + q.target;
            }
            
            resultBox.style.display = 'block';
            
            // 記錄歷史
            addToHistory(q, isCorrect, gameState.total);
            
            // 根據題數顯示不同按鈕
            if (gameState.total >= 10 && gameState.total % 10 === 0) {
                // 10/20/30... 題顯示歷史和繼續按鈕
                document.getElementById('historySection').classList.add('show');
                document.getElementById('continueBtn').style.display = 'inline-block';
            } else {
                document.getElementById('nextBtn').style.display = 'inline-block';
            }
            
            // 更新分數
            document.getElementById('correctCount').textContent = gameState.correct;
            document.getElementById('wrongCount').textContent = gameState.wrong;
            document.getElementById('totalCount').textContent = gameState.total;
        }
        
        function continueGame() {
            generateQuestion();
        }
        
        function addToHistory(q, correct, qNum) {
            const historyItem = {
                question: q,
                correct: correct,
                qNum: qNum,
                retried: false
            };
            gameState.history.push(historyItem);
            renderHistory();
        }
        
        function renderHistory() {
            const container = document.getElementById('historyList');
            const count = gameState.history.length;
            document.getElementById('historyCount').textContent = count;
            
            // 顯示/摺疊
            const foldIndex = Math.floor(count / 10) * 10;
            if (foldIndex > 0) {
                document.getElementById('foldIndicator').style.display = 'block';
                document.getElementById('foldIndicator').textContent = `顯示更多 (隱藏前${foldIndex}題)`;
            }
            
            container.innerHTML = '';
            gameState.history.forEach((item, i) => {
                // 摺疊邏輯
                if (gameState.isFolded && i < foldIndex) {
                    const foldDiv = document.createElement('div');
                    foldDiv.className = 'history-item fold';
                    container.appendChild(foldDiv);
                    return;
                }
                
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="q-num">${item.qNum}</span>
                    <span class="q-text">${item.question.desc}: ${formatNumber(item.question.number)} → ${item.question.target}</span>
                    <span class="q-result"><span class="result-icon">${item.correct ? '✓' : '✗'}</span></span>
                    ${!item.correct ? `<button class="retry-btn" onclick="retryQuestion(${i})">重做</button>` : ''}
                    ${item.retried && item.correct ? '<span style="color:#27ae60;font-size:0.8rem;">已改正</span>' : ''}
                `;
                container.appendChild(div);
            });
        }
        
        function toggleFold() {
            gameState.isFolded = !gameState.isFolded;
            renderHistory();
        }
        
        function toggleHistory() {
            const list = document.getElementById('historyList');
            list.style.maxHeight = list.style.maxHeight ? '' : '300px';
        }
        
        function retryQuestion(index) {
            const item = gameState.history[index];
            
            // 顯示該題
            document.getElementById('questionType').textContent = item.question.desc;
            document.getElementById('numberDisplay').textContent = formatNumber(item.question.number);
            
            // 重新創建可點擊方格
            const container = document.getElementById('digitButtons');
            container.innerHTML = '';
            container.className = 'number-digits';
            
            const digits = getDigits(item.question.number);
            digits.forEach((d, i) => {
                const box = document.createElement('div');
                box.className = 'digit-box';
                box.textContent = d;
                box.dataset.value = d;
                box.onclick = () => {
                    const isCorrect = d === item.question.target;
                    gameState.history[index].retried = true;
                    gameState.history[index].correct = isCorrect;
                    
                    document.querySelectorAll('.digit-box').forEach(b => {
                        b.style.cursor = 'default';
                        if (parseInt(b.dataset.value) === item.question.target) b.classList.add('correct');
                    });
                    
                    const resultBox = document.getElementById('resultBox');
                    resultBox.style.display = 'block';
                    resultBox.className = isCorrect ? 'result-box correct' : 'result-box wrong';
                    document.getElementById('resultText').textContent = isCorrect ? '✅ 已改正！' : '仲係錯，正確答案係 ' + item.question.target;
                    document.getElementById('nextBtn').style.display = 'inline-block';
                    
                    renderHistory();
                };
                container.appendChild(box);
            });
            
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            
            // 滾動到題目
            document.getElementById('gameScreen').scrollIntoView({behavior: 'smooth'});
        }
        
        function nextQuestion() {
            generateQuestion();
        }
        
        function updateProgress() {
            const progress = (gameState.total / 20) * 100;
            document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
        }
    </script>
</body>
</html>
