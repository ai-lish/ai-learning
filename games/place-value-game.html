<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位值大挑戰 - AI Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #3498DB 0%, #8E44AD 100%); min-height: 100vh; color: #2C3E50; padding: 15px; }
        .container { max-width: 550px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { background: linear-gradient(135deg, #3498DB 0%, #8E44AD 100%); color: white; padding: 15px; text-align: center; }
        .header h1 { font-size: 1.4rem; margin-bottom: 5px; }
        .header a { color: white; text-decoration: none; font-size: 0.85rem; }
        
        .game-area { padding: 15px; }
        
        /* Score */
        .score-board { display: flex; justify-content: space-around; background: #f5f5f5; padding: 10px; border-radius: 8px; margin-bottom: 12px; }
        .score-item { text-align: center; }
        .score-num { font-size: 1.2rem; font-weight: bold; }
        .score-label { font-size: 0.7rem; color: #666; }
        .score-correct .score-num { color: #27ae60; }
        .score-wrong .score-num { color: #e74c3c; }
        
        /* Question */
        .question-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 12px; }
        .question-type { font-size: 1.1rem; font-weight: bold; color: #8E44Ad; margin-bottom: 12px; text-align: center; }
        
        /* Number Display */
        .number-container { text-align: center; margin: 12px 0; }
        .number-display { 
            font-size: 1.8rem; 
            font-weight: bold; 
            letter-spacing: 4px; 
            display: inline-flex;
            align-items: center;
            background: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .digit { 
            display: inline-block; 
            cursor: pointer; 
            padding: 4px 2px;
            border-radius: 4px;
            transition: all 0.15s;
            border: 2px solid transparent;
            min-width: 24px;
            text-align: center;
        }
        .digit:hover { border-color: #bbb; }
        .digit.selected { border-color: #8E44Ad; }
        .digit.correct { border-color: #27ae60; background: rgba(39, 174, 96, 0.1); }
        .digit.wrong { border-color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
        .decimal-point { font-weight: bold; color: #333; }
        
        /* Result */
        .result-row { display: flex; align-items: center; justify-content: center; margin-top: 12px; min-height: 30px; }
        .result-icon { font-size: 1.3rem; margin-left: 8px; }
        
        /* Buttons */
        .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
        .btn { padding: 10px 25px; font-size: 0.95rem; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-confirm { background: #8E44Ad; color: white; }
        .btn-confirm:hover { background: #7D3C98; }
        .btn-confirm:disabled { background: #ccc; cursor: not-allowed; }
        .btn-next { background: #3498DB; color: white; }
        .btn-next:hover { background: #2980B9; }
        
        /* History */
        .history-section { padding: 12px; border-top: 2px solid #eee; display: none; }
        .history-section.show { display: block; }
        .history-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; }
        .history-item { display: flex; align-items: center; padding: 6px; border-bottom: 1px solid #eee; gap: 8px; font-size: 0.8rem; }
        .history-item .q-num { color: #999; width: 20px; }
        .history-item .q-text { flex: 1; }
        .history-item .result-icon { font-size: 1rem; }
        
        .fold-indicator { background: #f5f5f5; padding: 6px; text-align: center; font-size: 0.75rem; color: #666; cursor: pointer; border-radius: 4px; margin-bottom: 4px; }
        
        .progress-bar { height: 5px; background: #eee; border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3498DB, #8E44Ad); transition: width 0.3s; }
        
        /* Start Screen */
        .start-screen { padding: 25px; text-align: center; }
        .start-btn { background: #8E44Ad; color: white; border: none; padding: 12px 35px; font-size: 1rem; border-radius: 25px; cursor: pointer; margin: 12px 0; }
        .instructions { background: #f8f9fa; padding: 12px; border-radius: 8px; text-align: left; font-size: 0.85rem; }
        .instructions h3 { color: #8E44Ad; margin-bottom: 6px; }
        .instructions li { margin: 4px 0; line-height: 1.3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 位值大挑戰</h1>
            <a href="S5Ch17.html">← 返回教學網站</a>
        </div>
        
        <div id="startScreen" class="start-screen">
            <div class="instructions">
                <h3>📖 遊戲說明</h3>
                <ol>
                    <li>睇題目，例如「取接近百位」</li>
                    <li>點擊數字中該位值既數字</li>
                    <li>可以轉多次選擇</li>
                    <li>確認後按「核對」</li>
                    <li>每 10 題顯示歷史記錄</li>
                </ol>
            </div>
            <button class="start-btn" onclick="startGame()">🎮 開始遊戲</button>
        </div>
        
        <div id="gameScreen" style="display:none;">
            <div class="game-area">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width:0%"></div>
                </div>
                
                <div class="score-board">
                    <div class="score-item score-correct">
                        <div class="score-num" id="correctCount">0</div>
                        <div class="score-label">正確</div>
                    </div>
                    <div class="score-item score-wrong">
                        <div class="score-num" id="wrongCount">0</div>
                        <div class="score-label">錯誤</div>
                    </div>
                    <div class="score-item">
                        <div class="score-num" id="totalCount">0</div>
                        <div class="score-label">總題數</div>
                    </div>
                </div>
                
                <div class="question-box">
                    <div class="question-type" id="questionType">取接近個位</div>
                    
                    <div class="number-container">
                        <div class="number-display" id="numberDisplay"></div>
                    </div>
                    
                    <p style="color:#666;font-size:0.8rem;text-align:center;">點擊正確既位值數字</p>
                    
                    <div class="result-row">
                        <span id="resultText"></span>
                        <span id="resultIcon" class="result-icon"></span>
                    </div>
                    
                    <div class="btn-row">
                        <button class="btn btn-confirm" id="confirmBtn" onclick="confirmAnswer()" disabled>✓ 核對</button>
                        <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()" style="display:none;">下一題 →</button>
                    </div>
                </div>
            </div>
            
            <div class="history-section" id="historySection">
                <div class="history-title">📋 歷史記錄 (<span id="historyCount">0</span>題)</div>
                <div class="fold-indicator" id="foldIndicator" onclick="toggleFold()" style="display:none;">顯示更多...</div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>
    
    <script>
        let gameState = {
            questions: [],
            currentIndex: 0,
            correct: 0,
            wrong: 0,
            total: 0,
            history: [],
            isFolded: false,
            selectedIndex: null,
            currentQuestion: null,
            isConfirmed: false
        };
        
        // 題目類型
        const questionTypes = [
            // 整數位值
            { type: '個位', desc: '取接近個位', number: () => randomNumber(1000, 99999), unit: '' },
            { type: '十位', desc: '取接近十位', number: () => randomNumber(100, 9999), unit: '' },
            { type: '百位', desc: '取接近百位', number: () => randomNumber(1000, 99999), unit: '' },
            { type: '千位', desc: '取接近千位', number: () => randomNumber(10000, 999999), unit: '' },
            { type: '萬位', desc: '取接近萬位', number: () => randomNumber(100000, 9999999), unit: '' },
            // 小數
            { type: '個位(元)', desc: '取整數/個位(元)', number: () => randomNumber(100, 999) + 0.5, unit: '元' },
            { type: '小數後一位', desc: '準確至0.1cm', number: () => randomNumber(10, 99) + randomDigit()/10, unit: 'cm' },
            { type: '小數後兩位', desc: '準確至0.01cm', number: () => randomNumber(10, 99) + randomDigit()/10 + randomDigit()/100, unit: 'cm' },
            { type: '小數後三位', desc: '準確至0.001cm', number: () => randomNumber(10, 99) + randomDigit()/10 + randomDigit()/100 + randomDigit()/1000, unit: 'cm' }
        ];
        
        function randomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        function randomDigit() {
            return Math.floor(Math.random() * 10);
        }
        
        function formatNumber(num) {
            if (Number.isInteger(num)) {
                return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            } else {
                return num.toFixed(3);
            }
        }
        
        // 獲取數字既每個部分（由左到右）
        function getNumberParts(num) {
            if (Number.isInteger(num)) {
                return {
                    parts: num.toString().split('').map(n => ({ value: parseInt(n), isDecimal: false })),
                    hasDecimal: false
                };
            } else {
                const intPart = Math.floor(num);
                const dec1 = Math.floor((num * 10) % 10);
                const dec2 = Math.floor((num * 100) % 10);
                const dec3 = Math.floor((num * 1000) % 10);
                
                // 由左到右顯示：[整數部分... 小數點 小數部分]
                const intStr = intPart.toString();
                return {
                    parts: [
                        ...intStr.split('').map(n => ({ value: parseInt(n), isDecimal: false })),
                        { value: '.', isDecimal: 'point' },
                        { value: dec1, isDecimal: true, decimalPos: 1 },
                        { value: dec2, isDecimal: true, decimalPos: 2 },
                        { value: dec3, isDecimal: true, decimalPos: 3 }
                    ],
                    hasDecimal: true
                };
            }
        }
        
        // 根據類型獲取目標位值（由左到右既index）
        function getTargetDigit(num, type) {
            const parts = getNumberParts(num);
            const intPart = Math.floor(num);
            
            // 搵到整數部分最後一個位既index
            const intPartLength = intPart.toString().length;
            
            switch(type) {
                case '個位': {
                    // 個位 = 最右手邊 = index = intPartLength - 1
                    return { value: intPart % 10, index: intPartLength - 1 };
                }
                case '十位': {
                    return { value: Math.floor(intPart / 10) % 10, index: intPartLength - 2 };
                }
                case '百位': {
                    return { value: Math.floor(intPart / 100) % 10, index: intPartLength - 3 };
                }
                case '千位': {
                    return { value: Math.floor(intPart / 1000) % 10, index: intPartLength - 4 };
                }
                case '萬位': {
                    return { value: Math.floor(intPart / 10000) % 10, index: intPartLength - 5 };
                }
                case '個位(元)': {
                    return { value: intPart % 10, index: intPartLength - 1 };
                }
                case '小數後一位': {
                    // 小數點既下一個位置 = intPartLength
                    return { value: Math.floor((num * 10) % 10), index: intPartLength };
                }
                case '小數後兩位': {
                    return { value: Math.floor((num * 100) % 10), index: intPartLength + 1 };
                }
                case '小數後三位': {
                    return { value: Math.floor((num * 1000) % 10), index: intPartLength + 2 };
                }
                default: return { value: 0, index: 0 };
            }
        }
        
        function startGame() {
            gameState = {
                questions: [],
                currentIndex: 0,
                correct: 0,
                wrong: 0,
                total: 0,
                history: [],
                isFolded: false,
                selectedIndex: null,
                currentQuestion: null,
                isConfirmed: false
            };
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            generateQuestion();
        }
        
        function generateQuestion() {
            const qType = questionTypes[Math.floor(Math.random() * questionTypes.length)];
            const num = qType.number();
            const target = getTargetDigit(num, qType.type);
            
            const question = {
                type: qType.type,
                desc: qType.desc,
                number: num,
                target: target.value,
                targetIndex: target.index,
                unit: qType.unit
            };
            
            gameState.questions.push(question);
            gameState.currentIndex = gameState.questions.length - 1;
            gameState.currentQuestion = question;
            gameState.selectedIndex = null;
            gameState.isConfirmed = false;
            
            displayQuestion(question);
            updateProgress();
        }
        
        function displayQuestion(q) {
            document.getElementById('questionType').textContent = q.desc;
            
            const parts = getNumberParts(q.number);
            const container = document.getElementById('numberDisplay');
            container.innerHTML = '';
            
            // 直接使用（已經係由左到右）
            parts.parts.forEach((part, i) => {
                if (part.isDecimal === 'point') {
                    const span = document.createElement('span');
                    span.className = 'decimal-point';
                    span.textContent = '.';
                    container.appendChild(span);
                } else {
                    const span = document.createElement('span');
                    span.className = 'digit';
                    span.textContent = part.value;
                    // 用 actual index（由左到右）
                    span.dataset.index = i;
                    span.onclick = () => selectDigit(span, i);
                    container.appendChild(span);
                }
            });
            
            // 顯示單位
            if (q.unit) {
                const unitSpan = document.createElement('span');
                unitSpan.style.marginLeft = '8px';
                unitSpan.style.color = '#666';
                unitSpan.textContent = q.unit;
                container.appendChild(unitSpan);
            }
            
            // 重置
            document.getElementById('confirmBtn').disabled = true;
            document.getElementById('confirmBtn').style.display = 'inline-block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('resultText').textContent = '';
            document.getElementById('resultIcon').textContent = '';
            document.getElementById('historySection').classList.remove('show');
        }
        
        function selectDigit(element, index) {
            if (gameState.isConfirmed) return;
            
            // 清除之前既選擇
            document.querySelectorAll('.digit').forEach(d => d.classList.remove('selected'));
            
            // 選中新既
            element.classList.add('selected');
            gameState.selectedIndex = index;
            
            document.getElementById('confirmBtn').disabled = false;
        }
        
        function confirmAnswer() {
            const q = gameState.currentQuestion;
            const selectedElement = document.querySelector('.digit.selected');
            if (!selectedElement) return;
            
            const selectedValue = parseInt(selectedElement.textContent);
            const selectedIndex = parseInt(selectedElement.dataset.index);
            const isCorrect = (selectedValue === q.target && selectedIndex === q.targetIndex);
            
            gameState.isConfirmed = true;
            gameState.total++;
            
            // 標記 - 整個數字顯示，只有正確既位變色
            document.querySelectorAll('.digit').forEach(d => {
                d.style.cursor = 'default';
                const idx = parseInt(d.dataset.index);
                const val = parseInt(d.textContent);
                
                // 正確既位
                if (val === q.target && idx === q.targetIndex) {
                    d.classList.add('correct');
                }
                // 錯誤選擇既位
                else if (d === selectedElement && !isCorrect) {
                    d.classList.add('wrong');
                }
            });
            
            // 顯示結果
            if (isCorrect) {
                gameState.correct++;
                document.getElementById('resultText').textContent = '正確！';
                document.getElementById('resultIcon').textContent = '✓';
                document.getElementById('resultIcon').style.color = '#27ae60';
            } else {
                gameState.wrong++;
                // 顯示完整數字
                document.getElementById('resultText').textContent = '答案: ' + formatNumber(q.number);
                document.getElementById('resultIcon').textContent = '✗';
                document.getElementById('resultIcon').style.color = '#e74c3c';
            }
            
            document.getElementById('correctCount').textContent = gameState.correct;
            document.getElementById('wrongCount').textContent = gameState.wrong;
            document.getElementById('totalCount').textContent = gameState.total;
            
            addToHistory(q, isCorrect, gameState.total);
            
            document.getElementById('confirmBtn').style.display = 'none';
            
            if (gameState.total >= 10 && gameState.total % 10 === 0) {
                document.getElementById('historySection').classList.add('show');
                document.getElementById('nextBtn').textContent = '繼續遊戲 →';
                // 滾動到歷史
                setTimeout(() => {
                    document.getElementById('historySection').scrollIntoView({behavior: 'smooth'});
                }, 300);
            } else {
                document.getElementById('nextBtn').textContent = '下一題 →';
            }
            document.getElementById('nextBtn').style.display = 'inline-block';
        }
        
        function nextQuestion() {
            generateQuestion();
        }
        
        function addToHistory(q, correct, qNum) {
            gameState.history.push({ question: q, correct: correct, qNum: qNum });
            renderHistory();
        }
        
        function renderHistory() {
            const container = document.getElementById('historyList');
            const count = gameState.history.length;
            document.getElementById('historyCount').textContent = count;
            
            const foldIndex = Math.floor(count / 10) * 10;
            if (foldIndex > 0) {
                document.getElementById('foldIndicator').style.display = 'block';
                document.getElementById('foldIndicator').textContent = `顯示更多 (隱藏前${foldIndex}題)`;
            }
            
            container.innerHTML = '';
            gameState.history.forEach((item, i) => {
                if (gameState.isFolded && i < foldIndex) return;
                
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="q-num">${item.qNum}</span>
                    <span class="q-text">${item.question.desc}: ${formatNumber(item.question.number)} → ${item.question.target}</span>
                    <span class="result-icon">${item.correct ? '✓' : '✗'}</span>
                `;
                container.appendChild(div);
            });
        }
        
        function toggleFold() {
            gameState.isFolded = !gameState.isFolded;
            renderHistory();
        }
        
        function updateProgress() {
            const progress = (gameState.total / 20) * 100;
            document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
        }
    </script>
</body>
</html>
