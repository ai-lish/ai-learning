<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位值大挑戰 - AI Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #3498DB 0%, #8E44AD 100%); min-height: 100vh; color: #2C3E50; padding: 15px; }
        .container { max-width: 750px; margin: 0 auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        
        /* Header & Unified Scores */
        .header { background: linear-gradient(135deg, #3498DB 0%, #8E44AD 100%); color: white; padding: 15px 15px 20px; text-align: center; }
        .header h1 { font-size: 1.4rem; margin-bottom: 12px; }
        .header-scores { display: inline-flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: rgba(0,0,0,0.15); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; }
        .header-scores span { margin: 0 5px; }
        .header-scores b { color: #f1c40f; font-size: 1.05rem; }
        .header-scores .correct-txt { color: #2ecc71; font-weight: bold; }

        .game-tabs { display: flex; background: #f5f5f5; border-bottom: 2px solid #ddd; }
        .game-tab { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; font-weight: 600; color: #666; transition: all 0.3s; border: none; background: none; font-size: 0.95rem; }
        .game-tab:hover:not(.locked) { background: #e0e0e0; }
        .game-tab.active { background: white; color: #8E44Ad; border-bottom: 3px solid #8E44Ad; }
        .game-tab.locked { opacity: 0.4; cursor: not-allowed; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        
        .question-box { background: #f8f9fa; padding: 25px 20px; border-radius: 12px; margin-bottom: 12px; text-align: center; }
        .question-type { font-size: 1.3rem; font-weight: bold; color: #2c3e50; margin-bottom: 15px; line-height: 1.4; }
        .question-type span.highlight { color: #8E44Ad; }
        
        /* Layout for Step Tab */
        .step-layout { display: flex; flex-direction: row; gap: 15px; align-items: stretch; margin-top: 10px; }
        .step-col { flex: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 160px; }
        .step-title { font-weight: bold; margin-bottom: 15px; color: #7f8c8d; font-size: 1rem; }
        @media (max-width: 650px) { .step-layout { flex-direction: column; } }

        .number-container { text-align: center; }
        .number-display { font-size: 2.2rem; font-weight: bold; letter-spacing: 2px; display: inline-flex; align-items: center; background: #fdfefe; padding: 10px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 2px solid #eee; }
        .unit-display { font-size: 1.2rem; margin-left: 8px; color: #555; font-weight: 500; letter-spacing: normal; }
        
        /* Digits */
        .digit { display: inline-block; cursor: pointer; padding: 4px 2px; border-radius: 6px; transition: all 0.15s; border: 2px solid transparent; min-width: 28px; text-align: center; }
        .digit.interactive:hover { background: #e0e0e0; border-color: #ccc; }
        .digit.selected { background: #3498DB; color: white; border-color: #2980B9; }
        .digit.correct { border-color: #27ae60; background: #e8f8f5; color: #27ae60; }
        .digit.wrong { border-color: #e74c3c; background: #fadbd8; color: #e74c3c; text-decoration: line-through; }
        .decimal-point { font-weight: bold; color: #333; margin: 0 2px; }
        
        /* Ruler */
        .ruler-container { width: 100%; position: relative; display: none; margin-top: 40px; margin-bottom: 20px; }
        .ruler-track { position: relative; height: 35px; border-bottom: 4px solid #34495e; margin-bottom: 40px; }
        .ruler-tick { position: absolute; bottom: -4px; width: 4px; background: #34495e; border-radius: 2px 2px 0 0; }
        .ruler-tick-left { left: 0; height: 20px; }
        .ruler-tick-right { right: 0; height: 20px; }
        .ruler-tick-mid { height: 12px; transform: translateX(-50%); display: none; }
        
        .ruler-bound { position: absolute; top: 40px; transform: translateX(-50%); padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 1.05rem; white-space: nowrap; transition: 0.2s; }
        .ruler-bound.btn { background: #fdfefe; color: #3498DB; cursor: pointer; border: 2px solid #3498DB; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .ruler-bound.btn:hover { background: #eaf2f8; transform: translateX(-50%) scale(1.05); }
        .ruler-bound.selected { background: #3498DB; color: white; border-color: #2980B9; transform: translateX(-50%) scale(1.05); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .ruler-bound.label { background: #f1f2f6; color: #2c3e50; border: 2px solid #ced6e0; z-index: 2; }
        .ruler-left { left: 0%; }
        .ruler-right { left: 100%; }
        
        /* True Value Marker */
        .ruler-marker { position: absolute; bottom: -4px; width: 4px; height: 28px; background: #e74c3c; transform: translateX(-50%); z-index: 10; display: none; }
        .ruler-marker.correct { background: #27ae60; }
        .ruler-val { position: absolute; top: -32px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.95rem; white-space: nowrap; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .ruler-val.correct { background: #27ae60; }
        .ruler-val::after { content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); border-width: 5px 5px 0; border-style: solid; border-color: #e74c3c transparent transparent transparent; }
        .ruler-val.correct::after { border-color: #27ae60 transparent transparent transparent; }

        /* Answers and Results */
        .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn-check { background: #f39c12; color: white; padding: 12px 35px; font-size: 1.1rem; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(243,156,18,0.3); }
        .btn-check:hover { background: #e67e22; transform: translateY(-2px); }
        
        .result-row { display: none; align-items: center; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .result-msg { font-size: 1.1rem; font-weight: bold; margin: 0; }
        .btn-next { background: #27ae60; color: white; padding: 10px 25px; font-size: 1.05rem; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }
        .btn-next:hover { background: #219a52; transform: translateY(-2px); }

        .ans-inline { display: none; background: #fdfefe; border: 2px dashed #bdc3c7; padding: 8px 15px; border-radius: 8px; font-size: 1.15rem; font-weight: bold; color: #2c3e50; white-space: nowrap; }
        .ans-inline span.ans-val { color: #8e44ad; }

        /* Input specific */
        .input-area { text-align: center; margin: 15px 0; }
        .input-display { font-size: 1.8rem; font-weight: bold; background: white; padding: 10px 20px; border-radius: 8px; border: 3px solid #ddd; width: 100%; max-width: 220px; text-align: center; letter-spacing: 2px; color: #8E44Ad; min-height: 60px; }
        .keyboard { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; max-width: 420px; margin: 25px auto 0; }
        .key { padding: 12px 0; font-size: 1.3rem; background: white; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; color: #333; transition: 0.1s; box-shadow: 0 2px 0 #ccc; }
        .key:active { transform: translateY(2px); box-shadow: 0 0 0 #ccc; }
        .key-action { background: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 2px 0 #a93226; font-size: 1.1rem; }
        .key-submit { grid-column: span 6; background: #8E44Ad; color: white; border-color: #7D3C98; box-shadow: 0 3px 0 #6c3483; margin-top: 8px; font-size: 1.1rem; padding: 14px 0; }
        
        /* Start Screen */
        .start-screen { padding: 30px 20px; text-align: center; }
        .start-btn { background: #8E44Ad; color: white; border: none; padding: 14px 40px; font-size: 1.1rem; border-radius: 30px; cursor: pointer; margin: 20px 0; font-weight: bold; box-shadow: 0 4px 15px rgba(142,68,173,0.3); }
        .instructions { background: #f8f9fa; padding: 15px 20px; border-radius: 12px; text-align: left; font-size: 0.95rem; border-left: 4px solid #8E44Ad; }
        .instructions h3 { color: #8E44Ad; margin-bottom: 8px; }
        .instructions li { margin: 8px 0; line-height: 1.5; color: #444; }
        
        /* Back Button */
        .back-btn { position: fixed; top: 20px; left: 20px; background: white; color: #8E44Ad; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 100; }
        .back-btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <a href="../S1Ch13.html" class="back-btn">← 返回</a>
    <div class="container">
        <div class="header">
            <h1>🎯 位值與捨入大挑戰</h1>
            <div id="score-header-step" class="header-scores">
                <span>第一步(位值): <span class="correct-txt" id="hs-s1-c">0</span>/<b><span id="hs-s1-t">0</span></b></span> | 
                <span>第二步(捨入): <span class="correct-txt" id="hs-s2-c">0</span>/<b><span id="hs-s2-t">0</span></b></span>
            </div>
            <div id="score-header-input" class="header-scores" style="display:none;">
                <span>作答正確數: <span class="correct-txt" id="hs-in-c">0</span> / 總題數: <b><span id="hs-in-t">0</span></b></span>
            </div>
        </div>

        <div class="game-tabs" id="tabs-bar">
            <button class="game-tab active" id="tab-btn-step" onclick="switchGameTab('step')">👆 點擊步驟版</button>
            <button class="game-tab" id="tab-btn-input" onclick="switchGameTab('input')">⌨️ 輸入答案版</button>
        </div>
        
        <div id="startScreen" class="start-screen">
            <div class="instructions">
                <h3>📖 遊戲說明</h3>
                <ul>
                    <li><strong>👆 點擊步驟版：</strong>左方點擊對應位值，右方選擇正確邊界數值。兩者都選好後再點擊「核對答案」！</li>
                    <li><strong>⌨️ 輸入答案版：</strong>直接用鍵盤輸入最終的捨入答案，並透過間尺核對。</li>
                    <li><strong style="color:#e74c3c;">注意：</strong>在點擊版中一旦選擇了位值，必須完成該題才能切換標籤頁！</li>
                </ul>
            </div>
            <button class="start-btn" onclick="startGame()">🎮 開始挑戰</button>
        </div>

        <div id="gameScreen" style="display:none;">
            <div id="tab-step" class="tab-content active">
                <div class="question-box">
                    <div class="question-type" id="qt-step"></div>
                    <div class="step-layout">
                        <div class="step-col">
                            <div class="step-title">第一步：點擊位值數字</div>
                            <div class="number-container">
                                <div class="number-display" id="nd-step"></div>
                            </div>
                        </div>
                        <div class="step-col">
                            <div class="step-title">第二步：選擇數線邊界</div>
                            <div id="ruler-step" class="ruler-container"></div>
                            <div id="ruler-placeholder" style="color:#aaa; font-style:italic; font-size:0.95rem;">請先點選左方的位值數字...</div>
                        </div>
                    </div>
                    <div class="btn-row" id="check-row-step" style="display:none;">
                        <button class="btn-check" onclick="checkStep()">✓ 核對答案</button>
                    </div>
                    <div class="result-row" id="rr-step">
                        <div id="ans-inline-step" class="ans-inline"></div>
                        <div id="rm-step" class="result-msg"></div>
                        <button class="btn-next" onclick="nextStepQ()">下一題 →</button>
                    </div>
                </div>
            </div>

            <div id="tab-input" class="tab-content">
                <div class="question-box">
                    <div class="question-type" id="qt-input"></div>
                    <div class="input-area">
                        <div class="number-display" style="font-size: 1.5rem; padding: 8px 15px; margin-bottom: 15px; background: #eee;" id="nd-input"></div>
                        <br>
                        <div style="display:inline-flex; align-items:center; gap:8px;">
                            <div class="input-display" id="in-val">_</div>
                            <span class="unit-display" id="in-unit"></span>
                        </div>
                    </div>
                    <div class="keyboard" id="kb-input">
                        <button class="key" onclick="typeKey('1')">1</button>
                        <button class="key" onclick="typeKey('2')">2</button>
                        <button class="key" onclick="typeKey('3')">3</button>
                        <button class="key" onclick="typeKey('4')">4</button>
                        <button class="key" onclick="typeKey('5')">5</button>
                        <button class="key" onclick="typeKey('6')">6</button>
                        <button class="key" onclick="typeKey('7')">7</button>
                        <button class="key" onclick="typeKey('8')">8</button>
                        <button class="key" onclick="typeKey('9')">9</button>
                        <button class="key" onclick="typeKey('0')">0</button>
                        <button class="key" onclick="typeKey('.')">.</button>
                        <button class="key key-action" onclick="typeKey('del')">⌫</button>
                        <button class="key key-submit" onclick="submitInput()">✓ 確定作答</button>
                    </div>
                    <div id="ruler-input" class="ruler-container" style="max-width:400px; margin: 50px auto 20px;"></div>
                    <div class="result-row" id="rr-input">
                        <div id="ans-inline-input" class="ans-inline"></div>
                        <div id="rm-input" class="result-msg"></div>
                        <button class="btn-next" onclick="nextInputQ()">下一題 →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const roundingTypes = [{ id: 'floor', name: '下捨入' }, { id: 'ceil', name: '上捨入' }, { id: 'round', name: '捨入' }];
        const targetConfigs = [
            { t: '萬位', p: 10000, u: '' }, { t: '千位', p: 1000, u: '' }, { t: '百位', p: 100, u: '' },
            { t: '十位', p: 10, u: '' }, { t: '個位', p: 1, u: '' }, { t: '整數', p: 1, u: '' },
            { t: '元', p: 1, u: '元' }, { t: '10kg', p: 10, u: 'kg' }, { t: '100m', p: 100, u: 'm' },
            { t: '十分位', p: 0.1, u: '' }, { t: '小數點後一位', p: 0.1, u: '' },
            { t: '0.1cm', p: 0.1, u: 'cm' }, { t: '0.1L', p: 0.1, u: 'L' }
        ];
        
        // 權重機制：記錄每種題目類型的錯誤次數
        let wrongCounts = {};
        
        // 權重選擇：答錯過的題目類型出現機會更高
        function getWeightedRandomIndex(arr) {
            let totalWeight = 0;
            let weights = arr.map((_, i) => {
                let key = i.toString();
                let w = 1 + (wrongCounts[key] || 0) * 2; // 錯誤次數越多，權重越高
                totalWeight += w;
                return w;
            });
            let r = Math.random() * totalWeight;
            let cumulative = 0;
            for (let i = 0; i < weights.length; i++) {
                cumulative += weights[i];
                if (r < cumulative) return i;
            }
            return arr.length - 1;
        }
        
        let gs = { cur: 'step', isLocked: false, step: { s1c: 0, s1t: 0, s2c: 0, s2t: 0, q: null, selDigit: null, selBound: null }, input: { c: 0, t: 0, q: null, val: '' } };

        function rnd(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
        function generateNumberForP(p) { let baseCount = rnd(10, 99); let base = baseCount * p; let r1 = rnd(1, 9) * (p / 10); let r2 = rnd(1, 9) * (p / 100); let num = base + r1 + r2; let decPlaces = p >= 1 ? 2 : Math.abs(Math.round(Math.log10(p))) + 2; return parseFloat(num.toFixed(decPlaces)); }
        function getRounded(num, p, type) { let factor = 1 / p; let res = type === 'floor' ? Math.floor(num * factor) / factor : type === 'ceil' ? Math.ceil(num * factor) / factor : Math.round(num * factor) / factor; let decPlaces = p >= 1 ? 0 : Math.abs(Math.round(Math.log10(p))); return parseFloat(res.toFixed(decPlaces)); }

        function switchGameTab(tab) { if (gs.isLocked) { let activeBtn = document.querySelector('.game-tab.active'); activeBtn.style.transform = 'translateY(2px)'; setTimeout(() => activeBtn.style.transform = 'translateY(0)', 150); return; } gs.cur = tab; document.querySelectorAll('.game-tab').forEach(x => x.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); document.getElementById('tab-btn-' + tab).classList.add('active'); document.getElementById('tab-' + tab).classList.add('active'); document.getElementById('score-header-step').style.display = tab === 'step' ? 'inline-flex' : 'none'; document.getElementById('score-header-input').style.display = tab === 'input' ? 'inline-flex' : 'none'; if (document.getElementById('gameScreen').style.display !== 'none') { if (tab === 'step') nextStepQ(); if (tab === 'input') nextInputQ(); } }
        function startGame() { document.getElementById('startScreen').style.display = 'none'; document.getElementById('gameScreen').style.display = 'block'; if (gs.cur === 'step') nextStepQ(); else nextInputQ(); updateScoreDisplays(); }
        function setTabLock(locked) { gs.isLocked = locked; document.querySelectorAll('.game-tab').forEach(t => { if (!t.classList.contains('active')) { locked ? t.classList.add('locked') : t.classList.remove('locked'); } }); }
        function createQuestion() { 
            // 使用權重選擇：答錯過的組合出現機會更高
            let configIdx = getWeightedRandomIndex(targetConfigs);
            let rTypeIdx = getWeightedRandomIndex(roundingTypes);
            let config = targetConfigs[configIdx]; 
            let rType = roundingTypes[rTypeIdx]; 
            let num = generateNumberForP(config.p); 
            let q = { num: num, p: config.p, u: config.u, tName: config.t, rId: rType.id, rName: rType.name, ans: getRounded(num, config.p, rType.id), configIdx: configIdx, rTypeIdx: rTypeIdx };
            return q;
        }
        function getDigitTargetIndex(str, p) { let dotIdx = str.indexOf('.'); if (dotIdx === -1) dotIdx = str.length; let offset = Math.round(Math.log10(p)); return offset >= 0 ? dotIdx - 1 - offset : dotIdx - offset; }
        function showAnswerFormat(containerId, q) { let box = document.getElementById(containerId); box.style.display = 'inline-block'; box.innerHTML = `答案：${q.num} = <span class="ans-val">${q.ans}${q.u}</span> (${q.rName}至${q.tName})`; }

        function renderNumberDigits(containerId, q, interactive) { let c = document.getElementById(containerId); c.innerHTML = ''; let str = q.num.toString(); for (let i = 0; i < str.length; i++) { let char = str[i]; if (char === '.') { let s = document.createElement('span'); s.className = 'decimal-point'; s.innerText = '.'; c.appendChild(s); } else { let s = document.createElement('span'); s.className = 'digit' + (interactive ? ' interactive' : ''); s.innerText = char; s.dataset.idx = i; if (interactive) s.onclick = () => handleDigitClick(i); c.appendChild(s); } } if (q.u) { let uSpan = document.createElement('span'); uSpan.className = 'unit-display'; uSpan.innerText = q.u; c.appendChild(uSpan); } }
        function renderRuler(containerId, q, interactive, showMarker) { let container = document.getElementById(containerId); container.style.display = 'block'; let floorVal = getRounded(q.num, q.p, 'floor'); let ceilVal = getRounded(q.num, q.p, 'ceil'); let decPlaces = q.p >= 1 ? 0 : Math.abs(Math.round(Math.log10(q.p))); let fStr = floorVal.toFixed(decPlaces); let cStr = ceilVal.toFixed(decPlaces); let pct = ((q.num - floorVal) / (ceilVal - floorVal)) * 100; if (pct < 0) pct = 0; if (pct > 100) pct = 100; let html = `<div class="ruler-track"><div class="ruler-tick ruler-tick-left"></div><div class="ruler-tick ruler-tick-mid" style="left: ${pct}%; display: ${showMarker ? 'block' : 'none'};"></div><div class="ruler-tick ruler-tick-right"></div><div class="ruler-bound ruler-left ${interactive ? 'btn' : 'label'}" ${interactive ? `onclick="handleBoundClick(${floorVal})"` : ''} data-val="${floorVal}">${fStr}</div><div class="ruler-bound ruler-right ${interactive ? 'btn' : 'label'}" ${interactive ? `onclick="handleBoundClick(${ceilVal})"` : ''} data-val="${ceilVal}">${cStr}</div><div class="ruler-marker" style="left: ${pct}%; display: ${showMarker ? 'block' : 'none'};"><div class="ruler-val">${q.num}</div></div></div>`; container.innerHTML = html; }

        function nextStepQ() { setTabLock(false); gs.step.q = createQuestion(); gs.step.selDigit = null; gs.step.selBound = null; let q = gs.step.q; document.getElementById('qt-step').innerHTML = `求 <span class="highlight">${q.num}${q.u}</span> ${q.rName} 至 ${q.tName}`; document.getElementById('ruler-step').style.display = 'none'; document.getElementById('ruler-placeholder').style.display = 'block'; document.getElementById('check-row-step').style.display = 'none'; document.getElementById('rr-step').style.display = 'none'; document.getElementById('ans-inline-step').style.display = 'none'; renderNumberDigits('nd-step', q, true); }
        function handleDigitClick(idx) { if(document.getElementById('check-row-step').style.display === 'none' && document.getElementById('rr-step').style.display !== 'none') return; setTabLock(true); gs.step.selDigit = idx; document.querySelectorAll('#nd-step .digit').forEach(x => { x.classList.remove('selected'); if(parseInt(x.dataset.idx) === idx) x.classList.add('selected'); }); document.getElementById('ruler-placeholder').style.display = 'none'; renderRuler('ruler-step', gs.step.q, true, false); if(gs.step.selBound !== null) { document.querySelectorAll('#ruler-step .ruler-bound').forEach(b => { if(parseFloat(b.dataset.val) === gs.step.selBound) b.classList.add('selected'); }); } checkEnableSubmitStep(); }
        function handleBoundClick(val) { gs.step.selBound = val; document.querySelectorAll('#ruler-step .ruler-bound').forEach(x => { x.classList.remove('selected'); if(parseFloat(x.dataset.val) === val) x.classList.add('selected'); }); checkEnableSubmitStep(); }
        function checkEnableSubmitStep() { if (gs.step.selDigit !== null && gs.step.selBound !== null) { document.getElementById('check-row-step').style.display = 'flex'; } }
        function checkStep() { 
            setTabLock(false); 
            document.getElementById('check-row-step').style.display = 'none'; 
            let q = gs.step.q; 
            let targetIdx = getDigitTargetIndex(q.num.toString(), q.p); 
            let dOk = (gs.step.selDigit === targetIdx); 
            let bOk = (gs.step.selBound === q.ans); 
            gs.step.s1t++; 
            gs.step.s2t++; 
            if(dOk) gs.step.s1c++; 
            if(bOk) gs.step.s2c++;
            
            // 記錄錯誤：用於權重機制
            let key = q.configIdx + '-' + q.rTypeIdx;
            if (!dOk) wrongCounts[q.configIdx.toString()] = (wrongCounts[q.configIdx.toString()] || 0) + 1;
            if (!bOk) wrongCounts[key] = (wrongCounts[key] || 0) + 1;
            
            // 判斷是否完全正確（用於顯示顏色）
            let isFullyCorrect = dOk && bOk;
            
            updateScoreDisplays(); 
            document.querySelectorAll('#nd-step .digit').forEach(x => { x.classList.remove('selected', 'interactive'); x.onclick = null; let idx = parseInt(x.dataset.idx); if (idx === targetIdx) x.classList.add('correct'); else if (idx === gs.step.selDigit && !dOk) x.classList.add('wrong'); }); 
            let rContainer = document.getElementById('ruler-step');
            rContainer.querySelectorAll('.ruler-bound').forEach(btn => { btn.classList.remove('btn', 'selected'); btn.classList.add('label'); btn.onclick = null; let v = parseFloat(btn.dataset.val); if (v === q.ans) { btn.style.background = isFullyCorrect ? '#27ae60' : '#27ae60'; btn.style.borderColor = '#27ae60'; btn.style.color = 'white'; } else if (v === gs.step.selBound && !bOk) { btn.style.background = '#e74c3c'; btn.style.borderColor = '#e74c3c'; btn.style.color = 'white'; } }); 
            
            // 正確時用綠色marker，錯誤時用紅色
            let marker = rContainer.querySelector('.ruler-marker');
            let valDiv = rContainer.querySelector('.ruler-val');
            rContainer.querySelector('.ruler-tick-mid').style.display = 'block';
            marker.style.display = 'block';
            if (isFullyCorrect) {
                marker.classList.add('correct');
                valDiv.classList.add('correct');
            } else {
                marker.classList.remove('correct');
                valDiv.classList.remove('correct');
            }
            
            let msg = dOk && bOk ? '<span style="color:#27ae60">🎉 完全正確！</span>' : dOk && !bOk ? '<span style="color:#e67e22">❌ 位值正確，但數值選錯了！</span>' : !dOk && bOk ? '<span style="color:#e67e22">❌ 位值點錯了，但數值選對了！</span>' : '<span style="color:#e74c3c">❌ 兩步都不正確。</span>'; 
            document.getElementById('rm-step').innerHTML = msg; 
            document.getElementById('rr-step').style.display = 'flex'; 
            showAnswerFormat('ans-inline-step', q); 
        }

        function nextInputQ() { gs.input.q = createQuestion(); gs.input.val = ''; let q = gs.input.q; document.getElementById('qt-input').innerHTML = `求 <span class="highlight">${q.num}${q.u}</span> ${q.rName} 至 ${q.tName}`; let numHtml = q.num.toString() + (q.u ? `<span class="unit-display">${q.u}</span>` : ''); document.getElementById('nd-input').innerHTML = numHtml; document.getElementById('in-unit').innerText = q.u; updateInputDisplay(); document.getElementById('kb-input').style.display = 'grid'; document.getElementById('ruler-input').style.display = 'none'; document.getElementById('rr-input').style.display = 'none'; document.getElementById('ans-inline-input').style.display = 'none'; }
        function typeKey(key) { if (key === 'del') gs.input.val = gs.input.val.slice(0, -1); else { if (key === '.' && gs.input.val.includes('.')) return; if (gs.input.val.length < 8) gs.input.val += key; } updateInputDisplay(); }
        function updateInputDisplay() { let display = document.getElementById('in-val'); display.innerText = gs.input.val === '' ? '_' : gs.input.val; display.style.color = gs.input.val === '' ? '#ccc' : '#8E44Ad'; }
        function submitInput() { 
            if (gs.input.val === '' || gs.input.val === '.') return; 
            let q = gs.input.q; 
            let ua = parseFloat(gs.input.val); 
            let isCorrect = (ua === q.ans); 
            gs.input.t++; 
            if (isCorrect) gs.input.c++; 
            
            // 記錄錯誤：用於權重機制
            let key = q.configIdx + '-' + q.rTypeIdx;
            if (!isCorrect) wrongCounts[key] = (wrongCounts[key] || 0) + 1;
            
            updateScoreDisplays(); 
            document.getElementById('kb-input').style.display = 'none'; 
            renderRuler('ruler-input', q, false, true); 
            
            // 正確時用綠色marker，錯誤時用紅色
            let rContainer = document.getElementById('ruler-input');
            let marker = rContainer.querySelector('.ruler-marker');
            let valDiv = rContainer.querySelector('.ruler-val');
            if (isCorrect) {
                marker.classList.add('correct');
                valDiv.classList.add('correct');
            } else {
                marker.classList.remove('correct');
                valDiv.classList.remove('correct');
            }
            
            document.querySelectorAll('#ruler-input .ruler-bound').forEach(label => { 
                if (parseFloat(label.dataset.val) === q.ans) { 
                    label.style.background = '#27ae60'; 
                    label.style.color = 'white'; 
                    label.style.borderColor = '#27ae60'; 
                } 
            }); 
            document.getElementById('rm-input').innerHTML = isCorrect ? '<span style="color:#27ae60">🎉 完全正確！</span>' : `<span style="color:#e74c3c">❌ 答錯了！</span>`; 
            document.getElementById('rr-input').style.display = 'flex'; 
            showAnswerFormat('ans-inline-input', q); 
        }
        function updateScoreDisplays() { document.getElementById('hs-s1-c').innerText = gs.step.s1c; document.getElementById('hs-s1-t').innerText = gs.step.s1t; document.getElementById('hs-s2-c').innerText = gs.step.s2c; document.getElementById('hs-s2-t').innerText = gs.step.s2t; document.getElementById('hs-in-c').innerText = gs.input.c; document.getElementById('hs-in-t').innerText = gs.input.t; }
    </script>
</body>
</html>
